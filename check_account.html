<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>профиль пользователя | школа 62</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background: #f8f9fc;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 32px 0;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: #f8f9fc;
            position: relative;
            padding: 0 16px;
        }

        .main-content {
            display: block;
            padding-bottom: 90px;
        }

        /* АНИМАЦИИ */
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeDown { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes musicPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(46,52,64,0.12), 0 10px 20px -8px rgba(0,0,0,0.07); }
            50% { box-shadow: 0 0 0 6px rgba(46,52,64,0.05), 0 14px 28px -8px rgba(0,0,0,0.10); }
        }
        @keyframes gradientMove { 0% { background-position: 0%; } 100% { background-position: 200%; } }
        @keyframes equalizer {
            0%, 100% { height: 6px; }
            25% { height: 14px; }
            50% { height: 8px; }
            75% { height: 16px; }
        }
        @keyframes newBadgePop {
            0% { transform: scale(0); }
            70% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        /* HEADER */
        .header {
            background: #ffffff;
            border-radius: 24px;
            padding: 16px 20px;
            margin: 8px 0 16px 0;
            box-shadow: 0 10px 20px -8px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(0, 0, 0, 0.02);
            animation: fadeDown 0.4s cubic-bezier(0.22,1,0.36,1) both;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-img {
            height: 36px;
            width: auto;
            object-fit: contain;
        }

        .logo h1 {
            font-size: 1.4rem;
            font-weight: 600;
            color: #1a1e2b;
            letter-spacing: -0.5px;
        }

        .header-icons {
            display: flex;
            gap: 16px;
        }

        .header-icon {
            font-size: 1.2rem;
            color: #8b93a6;
            transition: color 0.2s, transform 0.2s;
            cursor: pointer;
            text-decoration: none;
        }

        .header-icon:hover {
            color: #2e3440;
            transform: scale(1.15);
        }

        /* BACK LINK */
        .back-link {
            margin-bottom: 16px;
            animation: fadeUp 0.4s cubic-bezier(0.22,1,0.36,1) 0.05s both;
        }

        .back-btn {
            background: #f0f2f5;
            color: #1a1e2b;
            padding: 10px 18px;
            border-radius: 30px;
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(0, 0, 0, 0.02);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .back-btn:hover {
            background: #e4e6e9;
            transform: translateX(-2px);
        }

        /* USER INFO BAR */
        .user-info-bar {
            background: #ffffff;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 10px 20px -8px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 0, 0, 0.02);
            animation: fadeUp 0.45s cubic-bezier(0.22,1,0.36,1) 0.08s both;
            flex-wrap: wrap;
        }

        .user-avatar-mini {
            width: 56px;
            height: 56px;
            border-radius: 18px;
            overflow: hidden;
            border: 2px solid rgba(0, 0, 0, 0.05);
            flex-shrink: 0;
            transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
        }

        .user-avatar-mini:hover {
            transform: scale(1.07);
        }

        .user-avatar-mini img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .user-details {
            flex: 1;
            min-width: 0;
        }

        .user-nickname-wrapper {
            position: relative;
            display: inline-block;
            cursor: pointer;
        }

        .user-nickname {
            font-weight: 600;
            font-size: 1.2rem;
            color: #1a1e2b;
            letter-spacing: -0.3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
            display: block;
        }

        .user-meta {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 5px;
        }

        .user-class {
            background: #f0f2f5;
            color: #1a1e2b;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .user-prime {
            background: #f1c40f;
            color: #1a1e2b;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        /* MINI PROFILE CARD */
        .profile-mini-card {
            position: absolute;
            top: calc(100% + 10px);
            left: 0;
            background: white;
            border-radius: 20px;
            padding: 16px;
            width: 260px;
            box-shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(0, 0, 0, 0.05);
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s cubic-bezier(0.22,1,0.36,1);
            pointer-events: none;
            transform: translateY(4px);
        }

        .user-nickname-wrapper:hover .profile-mini-card {
            opacity: 1;
            visibility: visible;
            pointer-events: all;
            transform: translateY(0);
        }

        .mini-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .mini-avatar {
            width: 44px;
            height: 44px;
            border-radius: 13px;
            object-fit: cover;
            border: 2px solid rgba(0, 0, 0, 0.05);
            flex-shrink: 0;
        }

        .mini-info h4 {
            font-weight: 600;
            color: #1a1e2b;
            margin-bottom: 2px;
            font-size: 0.9rem;
        }

        .mini-info p {
            font-size: 0.7rem;
            color: #8b93a6;
        }

        .mini-stats {
            display: flex;
            gap: 12px;
            margin-bottom: 10px;
            padding: 8px 0;
            border-top: 1px solid #f0f2f5;
            border-bottom: 1px solid #f0f2f5;
        }

        .mini-stat {
            flex: 1;
            text-align: center;
        }

        .mini-stat-value {
            font-weight: 600;
            font-size: 0.9rem;
            color: #1a1e2b;
        }

        .mini-stat-label {
            font-size: 0.6rem;
            color: #8b93a6;
        }

        .mini-sticker {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            object-fit: cover;
            flex-shrink: 0;
        }

        .mini-status {
            font-size: 0.82rem;
            color: #1a1e2b;
            font-style: italic;
            background: #f8f9fc;
            padding: 8px 12px;
            border-radius: 12px;
            line-height: 1.4;
        }

        /* FRIEND ACTION */
        .friend-action {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
            animation: fadeUp 0.45s cubic-bezier(0.22,1,0.36,1) 0.1s both;
        }

        .friend-action-btn {
            background: #2e3440;
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 6px 16px -6px rgba(46, 52, 64, 0.35);
        }

        .friend-action-btn:hover {
            background: #1a1e2b;
            transform: translateY(-2px) scale(1.02);
        }

        .friend-action-btn:active {
            transform: scale(0.97);
        }

        .friend-action-btn.pending {
            background: #8b93a6;
            cursor: default;
            box-shadow: none;
        }

        .friend-action-btn.pending:hover {
            transform: none;
            background: #8b93a6;
        }

        .friend-action-btn.accepted {
            background: #27ae60;
            cursor: default;
            box-shadow: 0 6px 16px -6px rgba(39, 174, 96, 0.35);
        }

        .friend-action-btn.accepted:hover {
            transform: none;
            background: #27ae60;
        }

        /* PROFILE CARD */
        .profile-card {
            background: #ffffff;
            border-radius: 28px;
            padding: 28px;
            margin-bottom: 20px;
            box-shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(0, 0, 0, 0.02);
            animation: fadeUp 0.5s cubic-bezier(0.22,1,0.36,1) 0.12s both;
        }

        /* AVATAR */
        .avatar-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 24px;
        }

        .avatar-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 24px;
            object-fit: cover;
            border: 2px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 8px 20px -8px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s;
        }

        .avatar-container:hover .avatar {
            transform: scale(1.02);
        }

        /* FRAMES */
        .avatar-frame-neon { position: absolute; top: -3px; left: -3px; right: -3px; bottom: -3px; border-radius: 26px; border: 3px solid #00ff88; box-shadow: 0 0 15px #00ff88; pointer-events: none; }
        .avatar-frame-gold { position: absolute; top: -3px; left: -3px; right: -3px; bottom: -3px; border-radius: 26px; border: 3px solid #f1c40f; box-shadow: 0 0 15px #f1c40f; pointer-events: none; }
        .avatar-frame-event { position: absolute; top: -3px; left: -3px; right: -3px; bottom: -3px; border-radius: 26px; border: 3px solid #ff6b6b; box-shadow: 0 0 15px #ff6b6b; pointer-events: none; }

        /* STICKERS */
        .sticker { position: absolute; width: 70px; height: 70px; border-radius: 16px; object-fit: cover; border: none; box-shadow: 0 4px 8px -4px rgba(0, 0, 0, 0.2); z-index: 5; }
        .sticker-pos-1 { top: -10px; left: -10px; width: 60px; height: 60px; }
        .sticker-pos-2 { top: -10px; right: -10px; width: 60px; height: 60px; }
        .sticker-pos-3 { bottom: -10px; left: -10px; width: 60px; height: 60px; }
        .sticker-pos-4 { bottom: -10px; right: -10px; width: 60px; height: 60px; }
        .sticker-pos-5 { top: 50%; left: 50%; transform: translate(-50%, -50%); width: 120px; height: 120px; }
        .sticker-pos-6 { top: -10px; left: 50%; transform: translateX(-50%); }
        .sticker-pos-7 { bottom: -10px; left: 50%; transform: translateX(-50%); }
        .sticker-pos-8 { left: -10px; top: 50%; transform: translateY(-50%); }
        .sticker-pos-9 { right: -10px; top: 50%; transform: translateY(-50%); }

        /* STATUS SECTION */
        .status-section {
            background: #f8f9fc;
            border-radius: 18px;
            padding: 16px 20px;
            border: 1px solid rgba(0, 0, 0, 0.03);
        }

        .status-label {
            font-size: 0.72rem;
            font-weight: 600;
            color: #8b93a6;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-text {
            font-size: 0.95rem;
            color: #1a1e2b;
            line-height: 1.5;
        }

        /* МУЗЫКА — перенесено из your_account */
        .music-section {
            background: #ffffff;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 20px -8px rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.02);
            animation: fadeUp 0.5s cubic-bezier(0.22,1,0.36,1) 0.18s both, musicPulse 3s ease-in-out 1s 3;
            position: relative;
            overflow: hidden;
        }

        .music-section::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, #2e3440, #667eea, #764ba2, #2e3440);
            background-size: 200%;
            animation: gradientMove 3s linear infinite;
        }

        .music-section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }

        .music-section-title {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .music-section-title h3 {
            font-size: 0.85rem;
            font-weight: 600;
            color: #8b93a6;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .music-new-badge {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            animation: newBadgePop 0.4s cubic-bezier(0.34,1.56,0.64,1) 0.5s both;
        }

        .equalizer {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            height: 20px;
        }

        .eq-bar {
            width: 3px;
            background: linear-gradient(to top, #2e3440, #667eea);
            border-radius: 2px;
        }

        .eq-bar:nth-child(1) { animation: equalizer 0.8s ease-in-out infinite; }
        .eq-bar:nth-child(2) { animation: equalizer 0.8s ease-in-out 0.15s infinite; }
        .eq-bar:nth-child(3) { animation: equalizer 0.8s ease-in-out 0.3s infinite; }
        .eq-bar:nth-child(4) { animation: equalizer 0.8s ease-in-out 0.1s infinite; }
        .eq-bar.paused { animation-play-state: paused; height: 4px !important; }

        .music-empty {
            text-align: center;
            padding: 20px;
            color: #b5bcc8;
            font-size: 0.9rem;
            font-style: italic;
        }

        .music-embed-preview {
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 6px 16px -6px rgba(0,0,0,0.1);
            transition: all 0.3s;
        }

        .music-embed-preview:hover {
            box-shadow: 0 10px 24px -6px rgba(0,0,0,0.15);
            transform: translateY(-2px);
        }

        .music-embed-preview iframe {
            display: block;
            border: none;
            width: 100%;
        }

        /* FRIENDS SECTION */
        .friends-section {
            background: #ffffff;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 20px -8px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 0, 0, 0.02);
            animation: fadeUp 0.5s cubic-bezier(0.22,1,0.36,1) 0.22s both;
        }

        .friends-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .friends-header h3 {
            font-size: 0.85rem;
            font-weight: 600;
            color: #8b93a6;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .friends-count {
            background: #2e3440;
            color: white;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .friends-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            max-height: 320px;
            overflow-y: auto;
            padding-right: 2px;
        }

        .friends-grid::-webkit-scrollbar { width: 4px; }
        .friends-grid::-webkit-scrollbar-track { background: transparent; }
        .friends-grid::-webkit-scrollbar-thumb { background: #e4e6e9; border-radius: 4px; }

        .friend-card {
            background: #f8f9fc;
            border-radius: 18px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(0, 0, 0, 0.02);
            transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }

        .friend-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px -8px rgba(0, 0, 0, 0.1);
            border-color: rgba(0, 0, 0, 0.05);
        }

        .friend-avatar {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            overflow: hidden;
            border: 2px solid rgba(0, 0, 0, 0.04);
            flex-shrink: 0;
        }

        .friend-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .friend-info {
            flex: 1;
            min-width: 0;
        }

        .friend-name {
            font-weight: 600;
            color: #1a1e2b;
            margin-bottom: 3px;
            font-size: 0.85rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .friend-class {
            font-size: 0.65rem;
            color: #8b93a6;
            background: #f0f2f5;
            padding: 2px 8px;
            border-radius: 30px;
            display: inline-block;
        }

        .friend-badge {
            display: inline-flex;
            align-items: center;
            background: #f1c40f;
            color: #1a1e2b;
            padding: 2px 6px;
            border-radius: 30px;
            font-size: 0.6rem;
            font-weight: 600;
            margin-left: 3px;
        }

        .empty-friends {
            text-align: center;
            padding: 30px;
            color: #8b93a6;
            font-size: 0.9rem;
            grid-column: 1 / -1;
        }

        /* STICKERS GRID */
        .stickers-grid-section {
            background: #f8f9fc;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(0, 0, 0, 0.02);
            animation: fadeUp 0.5s cubic-bezier(0.22,1,0.36,1) 0.26s both;
        }

        .stickers-grid-section h3 {
            font-size: 0.85rem;
            font-weight: 600;
            color: #8b93a6;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stickers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 12px;
        }

        .sticker-thumb {
            background: #ffffff;
            border-radius: 16px;
            padding: 12px;
            text-align: center;
            border: 1px solid rgba(0, 0, 0, 0.04);
            transition: transform 0.2s;
        }

        .sticker-thumb:hover { transform: translateY(-2px); }

        .sticker-thumb img {
            width: 56px;
            height: 56px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 6px;
        }

        .sticker-rarity {
            font-size: 0.65rem;
            color: #8b93a6;
        }

        /* REACTIONS */
        .reactions-section {
            background: #f8f9fc;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(0, 0, 0, 0.02);
            animation: fadeUp 0.5s cubic-bezier(0.22,1,0.36,1) 0.3s both;
        }

        .reactions-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: #8b93a6;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 14px;
        }

        .reactions-grid {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .reaction-item {
            background: #ffffff;
            border: 1px solid rgba(0, 0, 0, 0.05);
            border-radius: 40px;
            padding: 10px 18px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .reaction-item:hover {
            border-color: #2e3440;
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 6px 14px -6px rgba(0,0,0,0.1);
        }

        .reaction-item:active {
            transform: scale(0.95);
        }

        .reaction-count {
            font-size: 0.85rem;
            color: #8b93a6;
            font-weight: 500;
        }

        /* BOTTOM NAVIGATION */
        .bottom-nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            max-width: 560px;
            width: calc(100% - 32px);
            border-radius: 40px;
            padding: 6px;
            display: flex;
            justify-content: space-around;
            box-shadow: 0 10px 30px -8px rgba(0, 0, 0, 0.15);

    <div id="messageContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://wdcwxvxkvyncybsefotj.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_VMEPI3FAZoKDgX4ae_pqcg_Euvs40hM';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let profileUser = null;
        let currentUserId = localStorage.getItem('userId');
        let friendStatus = null;
        let friendRequestId = null;
        let friends = [];

        // ============================================
        // УТИЛИТЫ
        // ============================================
        function showMessage(text, type) {
            const container = document.getElementById('messageContainer');
            const msg = document.createElement('div');
            msg.className = `message ${type}`;
            msg.textContent = text;
            container.appendChild(msg);
            setTimeout(() => {
                msg.style.animation = 'slideIn 0.3s reverse';
                setTimeout(() => msg.remove(), 280);
            }, 2700);
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ============================================
        // МУЗЫКА — только просмотр
        // ============================================
        function detectMusicService(url) {
            if (!url) return null;
            if (url.includes('youtube.com') || url.includes('youtu.be')) return 'youtube';
            if (url.includes('soundcloud.com')) return 'soundcloud';
            return null;
        }

        function getYouTubeId(url) {
            const patterns = [
                /youtube\.com\/watch\?v=([^&]+)/,
                /youtu\.be\/([^?]+)/,
                /youtube\.com\/embed\/([^?]+)/
            ];
            for (const p of patterns) {
                const m = url.match(p);
                if (m) return m[1];
            }
            return null;
        }

        function renderMusicSection(url) {
            const section = document.getElementById('musicSection');
            const preview = document.getElementById('musicPreview');
            const bars = document.getElementById('equalizerBars');

            if (!url) {
                section.style.display = 'none';
                return;
            }

            const service = detectMusicService(url);
            if (!service) {
                section.style.display = 'none';
                return;
            }

            section.style.display = 'block';

            // запускаем эквалайзер
            if (bars) bars.querySelectorAll('.eq-bar').forEach(b => b.classList.remove('paused'));

            if (service === 'youtube') {
                const videoId = getYouTubeId(url);
                if (!videoId) { section.style.display = 'none'; return; }
                preview.innerHTML = `
                    <div class="music-embed-preview">
                        <iframe height="120"
                            src="https://www.youtube.com/embed/${videoId}?modestbranding=1&rel=0"
                            frameborder="0"
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope"
                            allowfullscreen></iframe>
                    </div>`;
            } else if (service === 'soundcloud') {
                const encoded = encodeURIComponent(url);
                preview.innerHTML = `
                    <div class="music-embed-preview">
                        <iframe height="120"
                            src="https://w.soundcloud.com/player/?url=${encoded}&color=%232e3440&auto_play=false&hide_related=true&show_comments=false&show_user=true&show_reposts=false&show_teaser=false&visual=false"
                            frameborder="0" allow="autoplay"></iframe>
                    </div>`;
            }
        }

        // ============================================
        // ЗАГРУЗКА ПРОФИЛЯ
        // ============================================
        async function loadProfile() {
            const urlParams = new URLSearchParams(window.location.search);
            const profileId = urlParams.get('id');

            if (!profileId) {
                showMessage('ID пользователя не указан', 'error');
                setTimeout(() => window.history.back(), 2000);
                return;
            }

            if (profileId === currentUserId) {
                window.location.href = 'https://ggfh-becouse.github.io/school62-vote/your_account.html';
                return;
            }

            try {
                const { data, error } = await supabaseClient
                    .from('users')
                    .select('*')
                    .eq('id', profileId)
                    .single();

                if (error || !data) {
                    showMessage('Пользователь не найден', 'error');
                    setTimeout(() => window.history.back(), 2000);
                    return;
                }

                profileUser = data;

                await Promise.all([
                    loadUserData(),
                    loadStickers(),
                    loadReactions(),
                    loadFrame(),
                    checkFriendStatus(),
                    loadFriends()
                ]);

            } catch (error) {
                console.error('Ошибка:', error);
                showMessage('Ошибка загрузки профиля', 'error');
            }
        }

        // ============================================
        // ДАННЫЕ ПОЛЬЗОВАТЕЛЯ
        // ============================================
        async function loadUserData() {
            document.getElementById('userNickname').textContent = profileUser.display_name || profileUser.nickname;
            document.getElementById('userClass').textContent = profileUser.class || 'Класс не указан';
            document.getElementById('userPrime').textContent = profileUser.is_prime ? 'prime' : 'обычный';

            const avatarUrl = profileUser.avatar_url || 'https://i.pravatar.cc/300';
            document.getElementById('avatar').src = avatarUrl;
            document.getElementById('miniAvatar').src = avatarUrl;

            document.getElementById('statusDisplay').textContent = profileUser.status || 'Статус не установлен';

            // Музыка
            renderMusicSection(profileUser.music_url || null);
        }

        async function loadFrame() {
            const frameDiv = document.getElementById('avatarFrame');
            const frame = profileUser.frame || 'standard';
            const frames = {
                standard: '',
                neon: '<div class="avatar-frame-neon"></div>',
                gold: '<div class="avatar-frame-gold"></div>',
                event: '<div class="avatar-frame-event"></div>'
            };
            frameDiv.innerHTML = frames[frame] || '';
        }

        // ============================================
        // СТИКЕРЫ
        // ============================================
        async function loadStickers() {
            try {
                const { data, error } = await supabaseClient
                    .from('user_stickers')
                    .select('*')
                    .eq('user_id', profileUser.id);

                if (error) throw error;

                if (!data || data.length === 0) {
                    document.getElementById('stickersSection').style.display = 'none';
                    return;
                }

                document.getElementById('stickersSection').style.display = 'block';

                // Стикеры на аватарке
                const container = document.getElementById('avatarContainer');
                container.querySelectorAll('.sticker').forEach(s => s.remove());
                data.forEach(sticker => {
                    const el = document.createElement('img');
                    el.src = sticker.sticker_url;
                    el.className = `sticker ${sticker.position}`;
                    el.onerror = () => el.remove();
                    container.appendChild(el);
                });

                // Грид стикеров
                document.getElementById('stickersGrid').innerHTML = data.map(s => `
                    <div class="sticker-thumb">
                        <img src="${s.sticker_url}" alt="Стикер">
                        <div class="sticker-rarity">${s.rarity || 'обычный'}</div>
                    </div>
                `).join('');

            } catch (error) {
                console.error('Ошибка загрузки стикеров:', error);
            }
        }

        // ============================================
        // КЕНТЫ
        // ============================================
        async function loadFriends() {
            try {
                const userId = parseInt(profileUser.id);

                const { data: sentFriends } = await supabaseClient
                    .from('friends')
                    .select('friend_id, users!friends_friend_id_fkey(id,nickname,display_name,class,avatar_url,is_prime,status)')
                    .eq('user_id', userId)
                    .eq('status', 'accepted');

                const { data: receivedFriends } = await supabaseClient
                    .from('friends')
                    .select('user_id, users!friends_user_id_fkey(id,nickname,display_name,class,avatar_url,is_prime,status)')
                    .eq('friend_id', userId)
                    .eq('status', 'accepted');

                friends = [
                    ...(sentFriends?.map(f => f.users) || []),
                    ...(receivedFriends?.map(f => f.users) || [])
                ];

                document.getElementById('friendsCount').textContent = friends.length;
                displayFriends();

            } catch (error) {
                console.error('Ошибка загрузки друзей:', error);
                document.getElementById('friendsCount').textContent = '0';
                document.getElementById('friendsGrid').innerHTML = '<div class="empty-friends">⚠️ ошибка загрузки</div>';
            }
        }

        function displayFriends() {
            const grid = document.getElementById('friendsGrid');

            if (!friends || friends.length === 0) {
                grid.innerHTML = '<div class="empty-friends">🤝 нет кентов</div>';
                return;
            }

            grid.innerHTML = friends.filter(Boolean).map(friend => `
                <a href="https://ggfh-becouse.github.io/school62-vote/check_account.html?id=${friend.id}" class="friend-card">
                    <div class="friend-avatar">
                        <img src="${friend.avatar_url || 'https://i.pravatar.cc/300'}" alt="">
                    </div>
                    <div class="friend-info">
                        <div class="friend-name">
                            ${escapeHtml(friend.display_name || friend.nickname || 'Пользователь')}
                            ${friend.is_prime ? '<span class="friend-badge"><i class="fas fa-crown"></i></span>' : ''}
                        </div>
                        <span class="friend-class">${escapeHtml(friend.class || 'класс')}</span>
                    </div>
                </a>
            `).join('');
        }

        // ============================================
        // СТАТУС ДРУЖБЫ
        // ============================================
        async function checkFriendStatus() {
            if (!currentUserId) {
                friendStatus = 'none';
                updateFriendButton();
                return;
            }

            try {
                const { data: sentData } = await supabaseClient
                    .from('friends')
                    .select('id, status')
                    .eq('user_id', parseInt(currentUserId))
                    .eq('friend_id', parseInt(profileUser.id))
                    .maybeSingle();

                if (sentData) {
                    friendStatus = sentData.status === 'pending' ? 'sent' : 'accepted';
                    friendRequestId = sentData.id;
                    updateFriendButton();
                    return;
                }

                const { data: receivedData } = await supabaseClient
                    .from('friends')
                    .select('id, status')
                    .eq('user_id', parseInt(profileUser.id))
                    .eq('friend_id', parseInt(currentUserId))
                    .maybeSingle();

                if (receivedData) {
                    friendStatus = receivedData.status === 'pending' ? 'pending' : 'accepted';
                    friendRequestId = receivedData.id;
                    updateFriendButton();
                    return;
                }

                friendStatus = 'none';
                updateFriendButton();

            } catch (error) {
                console.error('Ошибка проверки статуса дружбы:', error);
                friendStatus = 'none';
                updateFriendButton();
            }
        }

        function updateFriendButton() {
            const btn = document.getElementById('friendActionBtn');
            const states = {
                none:     { html: '<i class="far fa-user-plus"></i> добавить в кенты', cls: '' },
                sent:     { html: '<i class="far fa-clock"></i> запрос отправлен', cls: 'pending' },
                pending:  { html: '<i class="far fa-bell"></i> принять запрос', cls: '' },
                accepted: { html: '<i class="far fa-check"></i> уже в кентах', cls: 'accepted' }
            };
            const s = states[friendStatus] || states.none;
            btn.innerHTML = s.html;
            btn.className = `friend-action-btn ${s.cls}`;
        }

        window.handleFriendAction = async function() {
            if (!currentUserId) {
                showMessage('войдите, чтобы добавлять в кенты', 'error');
                return;
            }

            try {
                if (friendStatus === 'none') {
                    const { data, error } = await supabaseClient
                        .from('friends')
                        .insert({
                            user_id: parseInt(currentUserId),
                            friend_id: parseInt(profileUser.id),
                            status: 'pending',
                            created_at: new Date().toISOString(),
                            updated_at: new Date().toISOString()
                        })
                        .select().single();

                    if (error) {
                        if (error.code === '23505') { await checkFriendStatus(); return; }
                        throw error;
                    }
                    friendStatus = 'sent';
                    friendRequestId = data.id;
                    updateFriendButton();
                    showMessage('✅ запрос отправлен', 'success');

                } else if (friendStatus === 'pending') {
                    const { error } = await supabaseClient.from('friends')
                        .update({ status: 'accepted', updated_at: new Date().toISOString() })
                        .eq('id', friendRequestId);
                    if (error) throw error;
                    friendStatus = 'accepted';
                    updateFriendButton();
                    showMessage('✅ запрос принят', 'success');

                } else if (friendStatus === 'sent') {
                    if (!confirm('Отменить запрос?')) return;
                    const { error } = await supabaseClient.from('friends').delete().eq('id', friendRequestId);
                    if (error) throw error;
                    friendStatus = 'none';
                    friendRequestId = null;
                    updateFriendButton();
                    showMessage('✖️ запрос отменён', 'success');

                } else if (friendStatus === 'accepted') {
                    if (!confirm('Удалить из кентов?')) return;
                    const uid = parseInt(currentUserId);
                    const pid = parseInt(profileUser.id);

                    const { error: e1 } = await supabaseClient.from('friends').delete()
                        .eq('user_id', uid).eq('friend_id', pid).eq('status', 'accepted');

                    if (e1 && e1.code === 'PGRST116') {
                        const { error: e2 } = await supabaseClient.from('friends').delete()
                            .eq('user_id', pid).eq('friend_id', uid).eq('status', 'accepted');
                        if (e2) throw e2;
                    } else if (e1) throw e1;

                    friendStatus = 'none';
                    updateFriendButton();
                    showMessage('👋 кент удалён', 'success');
                }
            } catch (error) {
                console.error('Ошибка:', error);
                showMessage('ошибка: ' + error.message, 'error');
            }
        };

        // ============================================
        // РЕАКЦИИ
        // ============================================
        async function loadReactions() {
            try {
                const { data, error } = await supabaseClient
                    .from('profile_reactions')
                    .select('*')
                    .eq('user_id', profileUser.id);

                if (error) throw error;

                const reactions = ['❤️', '🔥', '😎', '🤡', '💀'];
                document.getElementById('reactionsGrid').innerHTML = reactions.map(reaction => {
                    const found = data?.find(r => r.reaction === reaction);
                    const count = found?.count || 0;
                    return `
                        <div class="reaction-item" onclick="addReaction('${reaction}')">
                            ${reaction} <span class="reaction-count">${count}</span>
                        </div>`;
                }).join('');

            } catch (error) {
                console.error('Ошибка загрузки реакций:', error);
            }
        }

        window.addReaction = async function(reaction) {
            if (!currentUserId) {
                showMessage('войдите, чтобы ставить реакции', 'error');
                return;
            }
            if (currentUserId === profileUser.id) {
                showMessage('нельзя ставить реакции себе', 'error');
                return;
            }
            try {
                const { error } = await supabaseClient
                    .from('profile_reactions')
                    .upsert({
                        user_id: profileUser.id,
                        reaction: reaction,
                        count: supabaseClient.rpc('increment', { x: 1 })
                    });
                if (error) throw error;
                await loadReactions();
                showMessage('✅ реакция добавлена', 'success');
            } catch (error) {
                console.error('Ошибка:', error);
                showMessage('ошибка: ' + error.message, 'error');
            }
        };

        // ============================================
        // МИНИ КАРТОЧКА
        // ============================================
        async function createMiniCard() {
            const wrapper = document.getElementById('nicknameWrapper');

            const { count: commentsCount } = await supabaseClient
                .from('comments')
                .select('*', { count: 'exact', head: true })
                .eq('name', profileUser.nickname);

            const { count: stickersCount } = await supabaseClient
                .from('user_stickers')
                .select('*', { count: 'exact', head: true })
                .eq('user_id', profileUser.id);

            const { data: stickers } = await supabaseClient
                .from('user_stickers')
                .select('*')
                .eq('user_id', profileUser.id)
                .limit(1);

            const miniCard = document.createElement('div');
            miniCard.className = 'profile-mini-card';
            miniCard.innerHTML = `
                <div class="mini-header">
                    <img src="${profileUser.avatar_url || 'https://i.pravatar.cc/300'}" class="mini-avatar">
                    <div class="mini-info">
                        <h4>${escapeHtml(profileUser.display_name || profileUser.nickname)}</h4>
                        <p>${escapeHtml(profileUser.class || 'класс не указан')}</p>
                    </div>
                    ${stickers?.length ? `<img src="${stickers[0].sticker_url}" class="mini-sticker">` : ''}
                </div>
                <div class="mini-stats">
                    <div class="mini-stat">
                        <div class="mini-stat-value">${commentsCount || 0}</div>
                        <div class="mini-stat-label">комменты</div>
                    </div>
                    <div class="mini-stat">
                        <div class="mini-stat-value">${stickersCount || 0}</div>
                        <div class="mini-stat-label">стикеры</div>
                    </div>
                    <div class="mini-stat">
                        <div class="mini-stat-value">${friends.length}</div>
                        <div class="mini-stat-label">кенты</div>
                    </div>
                </div>
                ${profileUser.status ? `<div class="mini-status">"${escapeHtml(profileUser.status)}"</div>` : ''}
            `;
            wrapper.appendChild(miniCard);
        }

        // ============================================
        // ИНИЦИАЛИЗАЦИЯ
        // ============================================
        document.addEventListener('DOMContentLoaded', async () => {
            await loadProfile();
            setTimeout(createMiniCard, 600);
        });
    </script>
</body>
</html>
