<!DOCTYPE html>
<html>
<head>
    <title>Supabase Test</title>
</head>
<body>
    <h1>Тест подключения Supabase</h1>
    <div id="result">Проверяю...</div>

    <!-- Подключаем Supabase -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <script>
        // Простейшая проверка
        const resultDiv = document.getElementById('result');
        
        if (typeof window.supabase !== 'undefined' && window.supabase) {
            resultDiv.innerHTML = '✅ Supabase загружен! <br>' +
                                 'createClient функция: ' + (typeof window.supabase.createClient);
        } else {
            resultDiv.innerHTML = '❌ Supabase НЕ загружен';
        }
    </script>
</body>
</html>
