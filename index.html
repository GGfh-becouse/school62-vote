<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>ОПРОСЫ 62 ШКОЛЫ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif !important;
        }

        body {
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 0;
            margin: 0;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: white;
            box-shadow: 0 0 30px rgba(0,0,0,0.05);
            min-height: 100vh;
            position: relative;
        }

        /* ЭКРАН СОГЛАШЕНИЯ */
        .agreement-screen {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 100% !important;
            background: rgba(0, 0, 0, 0.9) !important;
            backdrop-filter: blur(10px);
            display: flex !important;
            justify-content: center !important;
            align-items: center !important;
            z-index: 10000 !important;
            padding: 16px !important;
        }

        .agreement-card {
            background: white !important;
            border-radius: 32px !important;
            max-width: 520px !important;
            width: 100% !important;
            max-height: 90vh !important;
            overflow-y: auto !important;
            padding: 28px 24px !important;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4) !important;
            border: 2px solid #4a6fa5 !important;
        }

        .agreement-card h2 {
            font-size: 1.6rem !important;
            color: #2c3e50 !important;
            margin-bottom: 20px !important;
            padding-bottom: 12px !important;
            border-bottom: 3px solid #4a6fa5 !important;
            font-weight: 700 !important;
        }

        .agreement-card h2 span {
            background: #4a6fa5 !important;
            color: white !important;
            font-size: 0.9rem !important;
            padding: 4px 12px !important;
            border-radius: 30px !important;
            margin-left: 10px !important;
        }

        .agreement-text {
            color: #34495e !important;
            line-height: 1.6 !important;
            margin-bottom: 20px !important;
            font-size: 0.95rem !important;
        }

        .checkbox-container {
            background: #f8f9fa !important;
            padding: 18px !important;
            border-radius: 16px !important;
            margin: 20px 0 !important;
            display: flex !important;
            align-items: center !important;
            gap: 12px !important;
            cursor: pointer !important;
        }

        .checkbox-container input {
            width: 22px !important;
            height: 22px !important;
            cursor: pointer !important;
            accent-color: #4a6fa5 !important;
        }

        .checkbox-container label {
            font-size: 1rem !important;
            font-weight: 600 !important;
            color: #2c3e50 !important;
            cursor: pointer !important;
            flex: 1 !important;
        }

        .agreement-button {
            background: #4a6fa5 !important;
            color: white !important;
            border: none !important;
            width: 100% !important;
            padding: 16px !important;
            font-size: 1.2rem !important;
            font-weight: 700 !important;
            border-radius: 40px !important;
            cursor: pointer !important;
            transition: all 0.2s !important;
            border-bottom: 4px solid #2c3e50 !important;
        }

        .agreement-button:hover {
            background: #3a5a8a !important;
        }

        .agreement-button:disabled {
            background: #ccc !important;
            border-bottom-color: #999 !important;
            cursor: not-allowed !important;
            opacity: 0.7 !important;
        }

        /* ОСНОВНОЙ КОНТЕНТ */
        .main-content {
            display: none;
            padding: 16px;
        }

        /* Шапка */
        .header {
            background: linear-gradient(145deg, #4a6fa5 0%, #2c3e50 100%);
            border-radius: 24px;
            padding: 18px 20px;
            margin-bottom: 16px;
            box-shadow: 0 6px 0 #1a2a3a;
            position: relative;
        }

        .header h1 {
            color: white;
            font-size: 1.5rem;
            font-weight: 700;
            line-height: 1.3;
        }

        .header h1 small {
            font-size: 0.9rem;
            opacity: 0.9;
            display: block;
            margin-top: 4px;
        }

        /* ТОП-1 И ТАЙМЕР */
        .top-banner {
            background: linear-gradient(145deg, #ffd966, #ffb347);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 6px 0 #b38f4a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .top-info {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .top-avatar {
            width: 60px;
            height: 60px;
            border-radius: 30px;
            border: 3px solid white;
            box-shadow: 0 4px 0 #b38f4a;
        }

        .top-text h3 {
            color: #2c3e50;
            font-size: 1.1rem;
            font-weight: 500;
        }

        .top-text h2 {
            color: #2c3e50;
            font-size: 1.8rem;
            font-weight: 700;
            line-height: 1.2;
        }

        .top-text .votes {
            color: #4a6fa5;
            font-weight: 700;
            background: white;
            padding: 4px 12px;
            border-radius: 30px;
            display: inline-block;
            margin-top: 5px;
            border-bottom: 3px solid #b38f4a;
        }

        .timer-box {
            background: white;
            border-radius: 20px;
            padding: 15px 20px;
            text-align: center;
            min-width: 200px;
            border-bottom: 4px solid #b38f4a;
        }

        .timer-title {
            color: #2c3e50;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 5px;
        }

        .timer-display {
            font-size: 2rem;
            font-weight: 700;
            color: #4a6fa5;
            line-height: 1;
        }

        .timer-label {
            font-size: 0.8rem;
            color: #7f8c8d;
            margin-top: 5px;
        }

        /* ФОРМА СОЗДАНИЯ ОПРОСА */
        .create-poll {
            background: white;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            border: 2px solid #e0e0e0;
            box-shadow: 0 4px 0 #c0c0c0;
        }

        .create-poll h3 {
            color: #2c3e50;
            margin-bottom: 15px;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .poll-input-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .poll-input {
            flex: 1;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 16px;
            font-size: 0.95rem;
            transition: all 0.2s;
            min-width: 200px;
        }

        .poll-input:focus {
            border-color: #4a6fa5;
            outline: none;
        }

        .poll-submit {
            background: #4a6fa5;
            color: white;
            border: none;
            padding: 14px 25px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            border-bottom: 4px solid #2c3e50;
            transition: all 0.1s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .poll-submit:active {
            transform: translateY(2px);
            border-bottom-width: 2px;
        }

        .poll-hint {
            color: #7f8c8d;
            font-size: 0.8rem;
            margin-top: 8px;
        }

        /* СПИСОК ОПРОСОВ */
        .polls-section {
            margin-bottom: 20px;
        }

        .poll-item {
            background: white;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 15px;
            border: 2px solid #e0e0e0;
            box-shadow: 0 4px 0 #c0c0c0;
            transition: all 0.2s;
        }

        .poll-item.voted {
            opacity: 0.9;
            background: #f8f9fa;
        }

        .poll-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .poll-question {
            font-size: 1.2rem;
            font-weight: 700;
            color: #2c3e50;
            line-height: 1.4;
        }

        .poll-author {
            color: #7f8c8d;
            font-size: 0.85rem;
            background: #f8f9fa;
            padding: 4px 12px;
            border-radius: 30px;
            border: 1px solid #e0e0e0;
        }

        .poll-votes-total {
            color: #4a6fa5;
            font-weight: 600;
            margin-bottom: 12px;
            font-size: 0.9rem;
        }

        /* ВАРИАНТЫ ОТВЕТОВ */
        .poll-options {
            display: flex;
            gap: 12px;
            margin-bottom: 15px;
        }

        .poll-option {
            flex: 1;
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 16px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .poll-option:hover:not(.disabled) {
            border-color: #4a6fa5;
            transform: translateY(-2px);
        }

        .poll-option.yes:hover:not(.disabled) {
            background: #d4edda;
            border-color: #27ae60;
        }

        .poll-option.no:hover:not(.disabled) {
            background: #f8d7da;
            border-color: #c0392b;
        }

        .poll-option.disabled {
            cursor: default;
            opacity: 0.7;
        }

        .poll-option.voted-yes {
            background: #d4edda;
            border-color: #27ae60;
        }

        .poll-option.voted-no {
            background: #f8d7da;
            border-color: #c0392b;
        }

        .option-label {
            font-weight: 700;
            margin-bottom: 8px;
            font-size: 1.2rem;
        }

        .option-percent {
            font-size: 1.5rem;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 4px;
        }

        .option-count {
            color: #7f8c8d;
            font-size: 0.85rem;
        }

        /* ПРОГРЕСС БАР */
        .progress-bar {
            height: 30px;
            background: #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
            margin-top: 10px;
            display: flex;
        }

        .progress-yes {
            height: 100%;
            background: linear-gradient(90deg, #27ae60, #2ecc71);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 600;
            transition: width 0.3s;
        }

        .progress-no {
            height: 100%;
            background: linear-gradient(90deg, #c0392b, #e74c3c);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 600;
            transition: width 0.3s;
        }

        /* СТАТИСТИКА */
        .stats-container {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 15px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #4a6fa5;
        }

        .stat-label {
            color: #7f8c8d;
            font-size: 0.85rem;
        }

        /* СООБЩЕНИЯ */
        .message {
            position: fixed;
            top: 16px;
            right: 16px;
            padding: 12px 20px;
            border-radius: 30px;
            color: white;
            font-weight: 500;
            z-index: 10001;
            animation: slideIn 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            border-bottom: 4px solid rgba(0,0,0,0.2);
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .message.success { background: #4a6fa5; }
        .message.error { background: #c0392b; }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #4a6fa5;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* АДАПТАЦИЯ */
        @media (max-width: 600px) {
            .poll-options {
                flex-direction: column;
            }
            
            .top-banner {
                flex-direction: column;
                text-align: center;
            }
            
            .poll-input-group {
                flex-direction: column;
            }
            
            .poll-submit {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

        // ============================================
        function startTimer() {
            const targetDate = new Date('2025-03-15T00:00:00');
            
            function updateTimer() {
                const now = new Date();
                const diff = targetDate - now;

                if (diff <= 0) {
                    document.getElementById('timer').textContent = '00:00:00:00';
                    return;
                }

                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((diff % (1000 * 60)) / 1000);

                document.getElementById('timer').textContent =

            updateTimer();
            timerInterval = setInterval(updateTimer, 1000);

            const lowerText = text.toLowerCase();
            return bannedWords.some(word => lowerText.includes(word));

            } catch (error) {
                console.error('Ошибка загрузки опросов:', error);
                loader.style.display = 'none';
                pollsList.innerHTML = '<div style="text-align:center; padding:40px; color:#c0392b;">Ошибка загрузки</div>';
            }
        }

        // ============================================
        // ЗАГРУЗКА ПРОГОЛОСОВАННЫХ ОПРОСОВ
        // ============================================
        async function loadVotedPolls() {
            if (!userIp) return;
            
            try {
                const { data, error } = await supabaseClient
                    .from('poll_votes')
                    .select('poll_id')
                    .eq('ip_address', userIp);

                if (error) throw error;

                votedPolls.clear();
                data?.forEach(v => votedPolls.add(v.poll_id));
                
            } catch (error) {
                console.error('Ошибка загрузки голосований:', error);
            }
        }

        // ============================================
        // ОТОБРАЖЕНИЕ ОПРОСОВ
        // ============================================
        function displayPolls() {
            const pollsList = document.getElementById('pollsList');
            const loader = document.getElementById('pollsLoader');
            
            loader.style.display = 'none';
            
            if (!polls || polls.length === 0) {
                pollsList.innerHTML = `
                    <div style="text-align:center; padding:40px; color:#7f8c8d;">
                        <div style="font-size:48px; margin-bottom:15px;">📊</div>
                        <p>Пока нет опросов. Создайте первый!</p>
                    </div>
                `;
                return;
            }

            let html = '';
            polls.forEach(poll => {
                const totalVotes = (poll.yes_votes || 0) + (poll.no_votes || 0);
                const yesPercent = totalVotes > 0 ? Math.round((poll.yes_votes / totalVotes) * 100) : 0;
                const noPercent = totalVotes > 0 ? Math.round((poll.no_votes / totalVotes) * 100) : 0;
                
                const hasVoted = votedPolls.has(poll.id);
                const votedClass = hasVoted ? 'voted' : '';
                
                html += `
                    <div class="poll-item ${votedClass}" data-poll-id="${poll.id}">
                        <div class="poll-header">
                            <div class="poll-question">${escapeHtml(poll.question)}</div>
                            <div class="poll-author">👤 ${escapeHtml(poll.author || 'Аноним')}</div>
                        </div>
                        
                        <div class="poll-votes-total">Всего голосов: ${totalVotes}</div>
                        
                        <div class="poll-options">
                            <div class="poll-option yes ${hasVoted ? 'disabled' : ''} ${hasVoted && poll.userVote === 'yes' ? 'voted-yes' : ''}" 
                                 onclick="${!hasVoted ? `vote(${poll.id}, 'yes')` : ''}">
                                <div class="option-label">✅ ДА</div>
                                <div class="option-percent">${yesPercent}%</div>
                                <div class="option-count">${poll.yes_votes || 0} голосов</div>
                            </div>
                            
                            <div class="poll-option no ${hasVoted ? 'disabled' : ''} ${hasVoted && poll.userVote === 'no' ? 'voted-no' : ''}" 
                                 onclick="${!hasVoted ? `vote(${poll.id}, 'no')` : ''}">
                                <div class="option-label">❌ НЕТ</div>
                                <div class="option-percent">${noPercent}%</div>
                                <div class="option-count">${poll.no_votes || 0} голосов</div>
                            </div>
                        </div>
                        
                        <div class="progress-bar">
                            <div class="progress-yes" style="width: ${yesPercent}%;">${yesPercent}%</div>
                            <div class="progress-no" style="width: ${noPercent}%;">${noPercent}%</div>
                        </div>
                    </div>
                `;
            });
            
            pollsList.innerHTML = html;
        }

        // ============================================
        // ГОЛОСОВАНИЕ
        // ============================================
        async function vote(pollId, choice) {
            if (votedPolls.has(pollId)) {
                showMessage('Вы уже голосовали в этом опросе', 'error');
                return;
            }

            try {
                // Обновляем счетчики
                const poll = polls.find(p => p.id === pollId);
                const updateData = choice === 'yes' 
                    ? { yes_votes: (poll.yes_votes || 0) + 1 }
                    : { no_votes: (poll.no_votes || 0) + 1 };

                await supabaseClient
                    .from('polls')
                    .update(updateData)
                    .eq('id', pollId);

                // Сохраняем голос
                await supabaseClient
                    .from('poll_votes')
                    .insert({
                        poll_id: pollId,
                        ip_address: userIp,
                        choice: choice
                    });

                // Обновляем локальные данные
                if (choice === 'yes') {
                    poll.yes_votes = (poll.yes_votes || 0) + 1;
                } else {
                    poll.no_votes = (poll.no_votes || 0) + 1;
                }
                
                poll.userVote = choice;
                votedPolls.add(pollId);
                
                displayPolls();
                updateStats();
                updateTopBanner();
                
                showMessage('✅ Голос учтён!', 'success');
                
            } catch (error) {
                console.error('Ошибка голосования:', error);
                showMessage('Ошибка: ' + error.message, 'error');
            }
        }

        // ============================================
        // ОБНОВЛЕНИЕ ТОП-1
        // ============================================
        function updateTopBanner() {
            if (!polls || polls.length === 0) return;
            
            // Находим опрос с максимальным количеством голосов
            let topPoll = polls.reduce((max, poll) => {
                const total = (poll.yes_votes || 0) + (poll.no_votes || 0);
                return total > (max.total || 0) ? { ...poll, total } : max;
            }, { total: 0 });

            if (topPoll.id) {
                document.getElementById('topName').textContent = topPoll.question.substring(0, 30) + '...';
                document.getElementById('topVotes').textContent = `❤️ ${topPoll.total}`;
            }
        }

        // ============================================
        // ОБНОВЛЕНИЕ СТАТИСТИКИ
        // ============================================
        function updateStats() {
            const totalPolls = polls.length;
            let totalVotes = 0;
            
            polls.forEach(poll => {
                totalVotes += (poll.yes_votes || 0) + (poll.no_votes || 0);
            });
            
            document.getElementById('totalPolls').textContent = totalPolls;
            document.getElementById('totalVotes').textContent = totalVotes;
        }

        // ============================================
        // СОЗДАНИЕ ОПРОСА
        // ============================================
        async function createPoll() {
            const question = document.getElementById('pollQuestion').value.trim();
            
            if (!question) {
                showMessage('Введите вопрос', 'error');
                return;
            }

            if (question.length < 5) {
                showMessage('Слишком короткий вопрос', 'error');
                return;
            }

            if (question.length > 120) {
                showMessage('Максимум 120 символов', 'error');
                return;
            }

            if (checkBannedWords(question)) {
                showMessage('Вопрос содержит запрещённые слова', 'error');
                return;
            }

            // Антиспам
            const now = Date.now();
            if (now - lastPollTime < 30000) { // 30 секунд
                showMessage('Подождите 30 секунд перед созданием нового опроса', 'error');
                return;
            }

            try {
                if (!userIp) await getUserIp();

                const { data, error } = await supabaseClient
                    .from('polls')
                    .insert({
                        question: question,
                        author: currentUser?.nickname || 'Аноним',
                        ip_address: userIp,
                        yes_votes: 0,
                        no_votes: 0
                    })
                    .select()
                    .single();

                if (error) throw error;

                polls.unshift(data);
                lastPollTime = now;
                
                document.getElementById('pollQuestion').value = '';
                displayPolls();
                updateStats();
                
                showMessage('✅ Опрос создан!', 'success');
                
            } catch (error) {
                console.error('Ошибка создания опроса:', error);
                showMessage('Ошибка: ' + error.message, 'error');
            }
        }

        // ============================================
        // ЭКРАНИРОВАНИЕ HTML
        // ============================================
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ============================================
        // ИНИЦИАЛИЗАЦИЯ
        // ============================================
        async function initApp() {
            await getUserIp();
            await loadPolls();
            startTimer();
            
            // Загружаем данные пользователя
            const userId = localStorage.getItem('userId');
            if (userId) {
                const { data } = await supabaseClient
                    .from('users')
                    .select('*')
                    .eq('id', userId)
                    .single();
                currentUser = data;
            }

            // Обновляем онлайн
            document.getElementById('activeUsers').textContent = Math.floor(Math.random() * 50) + 50;
        }

        // ============================================
        // ОБРАБОТЧИКИ
        // ============================================
        document.getElementById('createPollBtn').addEventListener('click', createPoll);
        
        document.getElementById('pollQuestion').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                createPoll();
            }
        });

        // КНОПКА СВЯЗИ С АДМИНИСТРАЦИЕЙ
        const adminBtn = document.getElementById('adminBtn');
        const adminModal = document.getElementById('adminModal');
        const adminCancel = document.getElementById('adminCancel');
        const adminSubmit = document.getElementById('adminSubmit');

        adminBtn?.addEventListener('click', () => {
            adminModal.style.display = 'flex';
        });

        adminCancel?.addEventListener('click', () => {
            adminModal.style.display = 'none';
        });

        adminModal?.addEventListener('click', (e) => {
            if (e.target === adminModal) {
                adminModal.style.display = 'none';
            }
        });

        adminSubmit?.addEventListener('click', async () => {
            const name = document.getElementById('adminName').value.trim() || 'Аноним';
            const message = document.getElementById('adminMessage').value.trim();
            
            if (!message) {
                showMessage('Напишите сообщение', 'error');
                return;
            }

            try {
                await supabaseClient
                    .from('feedback')
                    .insert({
                        type: 'admin_message',
                        name: name,
                        message: message,
                        ip_address: userIp,
                        user_agent: navigator.userAgent
                    });
                
                showMessage('✅ Сообщение отправлено', 'success');
                adminModal.style.display = 'none';
                document.getElementById('adminName').value = '';
                document.getElementById('adminMessage').value = '';
                
            } catch (error) {
                showMessage('Ошибка: ' + error.message, 'error');
            }
        });

        // Обработка Escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && adminModal?.style.display === 'flex') {
                adminModal.style.display = 'none';
            }
        });

        // Глобальная функция для голосования
        window.vote = vote;
    </script>
</body>
</html>
