<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Vote App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Голосование</h1>

  <!-- Авторизация -->
  <div id="auth">
    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Пароль">
    <button id="signup">Регистрация</button>
    <button id="login">Войти</button>
  </div>

  <!-- Голосование -->
  <div id="vote" style="display:none;">
    <div class="card">
      <img id="img1">
      <p id="name1"></p>
      <button id="vote1">Выбрать</button>
    </div>

    <div class="card">
      <img id="img2">
      <p id="name2"></p>
      <button id="vote2">Выбрать</button>
    </div>
  </div>

  <h2>Топ персонажей</h2>
  <div id="top"></div>

  <!-- Сначала библиотека Supabase -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <!-- Потом твой скрипт -->
  <script src="script.js"></script>
</body>
</html>
