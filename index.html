<!DOCTYPE html>
<html>
<head>
    <title>Регистрация</title>
</head>
<body>
    <h2>Регистрация</h2>
    
    <input type="email" id="email" placeholder="Email" />
    <input type="password" id="password" placeholder="Пароль" />
    <button id="register">Зарегистрироваться</button>
    
    <div id="message"></div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        // ТВОИ ДАННЫЕ (вставь сюда)
        const SUPABASE_URL = 'https://твой-проект.supabase.co';
        const SUPABASE_KEY = 'твой-anon-key';
        
        // Используем ДРУГОЕ название переменной
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        document.getElementById('register').onclick = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');
            
            if (!email || !password) {
                messageDiv.innerHTML = 'Заполни все поля';
                return;
            }
            
            messageDiv.innerHTML = 'Отправка...';
            
            // Используем supabaseClient вместо supabase
            const { data, error } = await supabaseClient.auth.signUp({
                email: email,
                password: password
            });
            
            if (error) {
                messageDiv.innerHTML = 'Ошибка: ' + error.message;
            } else {
                messageDiv.innerHTML = '✅ Успех! Проверь почту';
            }
        };
    </script>
</body>
</html>
