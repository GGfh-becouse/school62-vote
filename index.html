<!DOCTYPE html>
<html>
<head>
    <title>Регистрация</title>
    <meta charset="UTF-8">
</head>
<body>
    <h2>Регистрация</h2>
    
    <input type="email" id="email" placeholder="Email" value="deepseek@email.com">
    <input type="password" id="password" placeholder="Пароль">
    <button id="register">Зарегистрироваться</button>
    
    <div id="message"></div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        const supabase = window.supabase.createClient(
            'https://rlgyttzgtwmshppwoucf.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJsZ3l0dHpndHdtc2hwcHdvdWNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mzc1MTY4MjUsImV4cCI6MjA1MzA5MjgyNX0.wfpAnWWxidNpL1NzxZlyS93K46QwwbK_PbCvXJcs4_Y'
        );
        
        document.getElementById('register').onclick = async () => {
            const fullEmail = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // Обрезаем email до первого символа @
            const shortEmail = fullEmail.split('@')[0] + '@temp.com';
            
            document.getElementById('message').innerHTML = 'Отправляем: ' + shortEmail;
            
            const { data, error } = await supabase.auth.signUp({
                email: shortEmail,
                password: password
            });
            
            if (error) {
                document.getElementById('message').innerHTML = 'Ошибка: ' + error.message;
            } else {
                document.getElementById('message').innerHTML = 'Успех! Проверь почту: ' + shortEmail;
            }
        };
    </script>
</body>
</html>
