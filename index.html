<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>СТЕНА 62 ШКОЛЫ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background: #f8f9fc;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 32px 0;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: #f8f9fc;
            position: relative;
            padding: 0 16px;
        }

        /* MAIN CONTENT */
        .main-content {
            display: block;
            padding-bottom: 90px;
        }

        /* HEADER - мягкая силиконовая плашка */
        .header {
            background: #ffffff;
            border-radius: 24px;
            padding: 20px 24px;
            margin: 8px 0 24px 0;
            box-shadow: 0 10px 20px -8px rgba(0, 0, 0, 0.1), 0 2px 4px 0 rgba(0, 0, 0, 0.02), inset 0 -2px 0 rgba(0,0,0,0.02);
            border: 1px solid rgba(0, 0, 0, 0.02);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo h1 {
            font-size: 1.6rem;
            font-weight: 600;
            color: #1a1e2b;
            letter-spacing: -0.5px;
        }

        .logo span {
            color: #8b93a6;
            font-size: 0.9rem;
            font-weight: 400;
            margin-left: 4px;
        }

        .header-icons {
            display: flex;
            gap: 20px;
        }

        .header-icon {
            font-size: 1.4rem;
            color: #2e3440;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .header-icon:hover {
            opacity: 1;
        }

        /* STORIES - силиконовые круги */
        .stories-container {
            margin-bottom: 24px;
        }

        .stories-scroll {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            scrollbar-width: none;
            padding: 4px 0;
        }

        .stories-scroll::-webkit-scrollbar {
            display: none;
        }

        .story-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            min-width: 72px;
            cursor: pointer;
        }

        .story-avatar {
            width: 72px;
            height: 72px;
            border-radius: 24px;
            background: #ffffff;
            padding: 4px;
            box-shadow: 0 15px 25px -8px rgba(0, 0, 0, 0.15), 0 2px 4px -2px rgba(0, 0, 0, 0.05), inset 0 -2px 0 rgba(0,0,0,0.02);
            border: 1px solid rgba(255,255,255,0.5);
        }

        .story-avatar img {
            width: 100%;
            height: 100%;
            border-radius: 20px;
            object-fit: cover;
        }

        .story-name {
            font-size: 0.7rem;
            font-weight: 500;
            color: #2e3440;
            opacity: 0.8;
        }

        /* QUICK NOTIFICATIONS - мягкие силиконовые бейджи */
        .quick-notifications {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            scrollbar-width: none;
            margin-bottom: 24px;
            padding: 4px 0;
        }

        .quick-notifications::-webkit-scrollbar {
            display: none;
        }

        .notification-badge {
            background: #ffffff;
            border-radius: 40px;
            padding: 12px 24px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #1a1e2b;
            white-space: nowrap;
            box-shadow: 0 10px 15px -5px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.03), inset 0 -2px 0 rgba(0,0,0,0.02);
            border: 1px solid rgba(0, 0, 0, 0.02);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.2s;
        }

        .notification-badge:hover {
            transform: translateY(-2px);
        }

        .notification-badge.highlight {
            background: #2e3440;
            color: white;
        }

        .notification-badge i {
            font-size: 1rem;
        }

        /* STATS - силиконовые блоки */
        .stats-container {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-item {
            flex: 1;
            background: #ffffff;
            border-radius: 20px;
            padding: 16px;
            text-align: center;
            box-shadow: 0 15px 25px -8px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.02), inset 0 -2px 0 rgba(0,0,0,0.02);
            border: 1px solid rgba(0, 0, 0, 0.02);
        }

        .stat-value {
            font-weight: 700;
            font-size: 1.8rem;
            color: #1a1e2b;
            line-height: 1;
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #8b93a6;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        /* CREATE POLL - силиконовый блок */
        .create-poll {
            background: #ffffff;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 24px;
            box-shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.02), inset 0 -2px 0 rgba(0,0,0,0.02);
            border: 1px solid rgba(0, 0, 0, 0.02);
        }

        .create-poll h3 {
            font-size: 0.9rem;
            font-weight: 600;
            color: #8b93a6;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
        }

        .poll-input-group {
            display: flex;
            gap: 12px;
        }

        .poll-input {
            flex: 1;
            padding: 16px 20px;
            border: none;
            border-radius: 20px;
            font-size: 0.95rem;
            background: #f8f9fc;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.02), inset 0 -2px 4px rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(0, 0, 0, 0.02);
        }

        .poll-input:focus {
            outline: none;
            box-shadow: inset 0 3px 6px rgba(0, 0, 0, 0.03), inset 0 -3px 6px rgba(255, 255, 255, 0.9);
        }

        .poll-submit {
            background: #2e3440;
            color: white;
            border: none;
            padding: 16px 28px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            box-shadow: 0 10px 15px -5px rgba(46, 52, 64, 0.3), 0 2px 4px -2px rgba(0, 0, 0, 0.05), inset 0 -2px 0 rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }

        .poll-submit:hover {
            transform: translateY(-2px);
        }

        /* POLL ITEMS - силиконовые карточки */
        .poll-item {
            background: #ffffff;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.02), inset 0 -2px 0 rgba(0,0,0,0.02);
            border: 1px solid rgba(0, 0, 0, 0.02);
        }

        .poll-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .poll-question {
            font-weight: 600;
            font-size: 1rem;
            color: #1a1e2b;
        }

        .poll-author {
            font-size: 0.8rem;
            color: #8b93a6;
            background: #f8f9fc;
            padding: 6px 12px;
            border-radius: 40px;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.02);
        }

        .poll-votes-total {
            font-size: 0.85rem;
            color: #8b93a6;
            margin-bottom: 16px;
            font-weight: 500;
        }

        .poll-options {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        .poll-option {
            flex: 1;
            background: #f8f9fc;
            border-radius: 20px;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.02), 0 4px 6px -2px rgba(0,0,0,0.05);
            border: 1px solid rgba(0, 0, 0, 0.02);
        }

        .poll-option:hover {
            transform: translateY(-2px);
        }

        .option-label {
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .option-percent {
            font-size: 1.6rem;
            font-weight: 700;
            color: #1a1e2b;
            line-height: 1;
            margin-bottom: 4px;
        }

        .option-count {
            font-size: 0.7rem;
            color: #8b93a6;
        }

        .progress-bar {
            height: 6px;
            background: #f0f2f5;
            border-radius: 3px;
            overflow: hidden;
            display: flex;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.05);
        }

        .progress-yes {
            height: 100%;
            background: #2e3440;
            transition: width 0.3s;
        }

        .progress-no {
            height: 100%;
            background: #8b93a6;
            transition: width 0.3s;
        }

        /* BATTLE SECTION */
        .battle-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }

        .candidate-card {
            background: #ffffff;
            border-radius: 24px;
            padding: 16px;
            position: relative;
            cursor: pointer;
            box-shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.02), inset 0 -2px 0 rgba(0,0,0,0.02);
            border: 1px solid rgba(0, 0, 0, 0.02);
            transition: transform 0.2s;
        }

        .candidate-card:hover {
            transform: translateY(-4px);
        }

        .candidate-card.selected {
            box-shadow: 0 25px 35px -12px rgba(46, 52, 64, 0.3), 0 2px 4px -2px rgba(0, 0, 0, 0.05), inset 0 -2px 0 #2e3440;
        }

        .candidate-photo {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 16px;
            object-fit: cover;
            margin-bottom: 12px;
        }

        .candidate-name {
            font-weight: 600;
            font-size: 0.95rem;
            color: #1a1e2b;
            margin-bottom: 4px;
        }

        .rating {
            font-size: 0.8rem;
            color: #8b93a6;
        }

        .rarity-badge {
            position: absolute;
            top: 24px;
            right: 24px;
            background: #ffffff;
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 0.6rem;
            font-weight: 600;
            color: #1a1e2b;
            box-shadow: 0 4px 8px -2px rgba(0,0,0,0.1), inset 0 -1px 0 rgba(0,0,0,0.02);
            border: 1px solid rgba(0,0,0,0.02);
        }

        .vote-button {
            background: #2e3440;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 24px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            width: 100%;
            margin-bottom: 24px;
            box-shadow: 0 15px 25px -8px rgba(46, 52, 64, 0.3), 0 2px 4px -2px rgba(0, 0, 0, 0.05), inset 0 -2px 0 rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }

        .vote-button:hover {
            transform: translateY(-2px);
        }

        /* PREDICTION BOX */
        .prediction-box {
            background: #ffffff;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 24px;
            box-shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.02), inset 0 -2px 0 rgba(0,0,0,0.02);
            border: 1px solid rgba(0, 0, 0, 0.02);
        }

        .prediction-box h3 {
            font-size: 0.9rem;
            font-weight: 600;
            color: #8b93a6;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
        }

        .prediction-bars {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .prediction-bar {
            flex: 1;
            height: 8px;
            background: #f0f2f5;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.05);
        }

        .prediction-fill {
            height: 100%;
            background: #2e3440;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 4px;
            color: white;
            font-size: 0.5rem;
        }

        /* ACHIEVEMENTS */
        .achievements {
            background: #ffffff;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 24px;
            box-shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.02), inset 0 -2px 0 rgba(0,0,0,0.02);
            border: 1px solid rgba(0, 0, 0, 0.02);
        }

        .achievements h3 {
            font-size: 0.9rem;
            font-weight: 600;
            color: #8b93a6;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
        }

        .achievement-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .achievement-item {
            background: #f8f9fc;
            border-radius: 20px;
            padding: 16px 12px;
            text-align: center;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.02), 0 4px 6px -2px rgba(0,0,0,0.05);
            border: 1px solid rgba(0, 0, 0, 0.02);
        }

        .achievement-item.unlocked {
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.02), 0 6px 10px -4px rgba(46, 52, 64, 0.2);
        }

        .achievement-icon {
            font-size: 1.8rem;
            margin-bottom: 8px;
        }

        .achievement-title {
            font-size: 0.75rem;
            font-weight: 600;
            color: #1a1e2b;
        }

        /* COMMENTS */
        .comments-section {
            background: #ffffff;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 24px;
            box-shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.02), inset 0 -2px 0 rgba(0,0,0,0.02);
            border: 1px solid rgba(0, 0, 0, 0.02);
        }

        .comments-section h3 {
            font-size: 0.9rem;
            font-weight: 600;
            color: #8b93a6;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
        }

        .comment-form {
            margin-bottom: 24px;
        }

        .comment-input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .comment-input,
        .comment-textarea {
            width: 100%;
            padding: 16px 20px;
            border: none;
            border-radius: 20px;
            font-size: 0.95rem;
            background: #f8f9fc;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.02), inset 0 -2px 4px rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(0, 0, 0, 0.02);
        }

        .comment-textarea {
            min-height: 100px;
            resize: none;
        }

        .comment-submit {
            background: #2e3440;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            width: 100%;
            margin-top: 12px;
            box-shadow: 0 10px 15px -5px rgba(46, 52, 64, 0.3), 0 2px 4px -2px rgba(0, 0, 0, 0.05), inset 0 -2px 0 rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }

        .comment-submit:hover {
            transform: translateY(-2px);
        }

        .comments-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .comment-item {
            background: #f8f9fc;
            border-radius: 20px;
            padding: 16px;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.02), 0 4px 6px -2px rgba(0,0,0,0.05);
            border: 1px solid rgba(0, 0, 0, 0.02);
        }

        .comment-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .comment-name {
            font-weight: 600;
            font-size: 0.9rem;
            color: #1a1e2b;
        }

        .comment-date {
            font-size: 0.7rem;
            color: #8b93a6;
        }

        .comment-message {
            font-size: 0.9rem;
            color: #1a1e2b;
            line-height: 1.5;
        }

        /* VERIFICATION */
        .verification-box {
            background: #ffffff;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 24px;
            box-shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.02), inset 0 -2px 0 rgba(0,0,0,0.02);
            border: 1px solid rgba(0, 0, 0, 0.02);
        }

        .verification-box h3 {
            font-size: 0.9rem;
            font-weight: 600;
            color: #8b93a6;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
        }

        .verification-input-group {
            display: flex;
            gap: 12px;
        }

        .verification-input {
            flex: 1;
            padding: 16px 20px;
            border: none;
            border-radius: 20px;
            font-size: 0.95rem;
            background: #f8f9fc;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.02), inset 0 -2px 4px rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(0, 0, 0, 0.02);
        }

        .verification-button {
            background: #2e3440;
            color: white;
            border: none;
            padding: 16px 28px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 10px 15px -5px rgba(46, 52, 64, 0.3), 0 2px 4px -2px rgba(0, 0, 0, 0.05), inset 0 -2px 0 rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }

        .verification-button:hover {
            transform: translateY(-2px);
        }

        .verification-status {
            margin-top: 16px;
            padding: 16px;
            background: #f0f9f0;
            border-radius: 20px;
            color: #1e7e34;
            display: none;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.02);
        }

        .verification-status.active {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* BOTTOM NAVIGATION - силиконовая панель */
        .bottom-nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            max-width: 560px;
            width: calc(100% - 32px);
            background: #ffffff;
            border-radius: 32px;
            padding: 8px;
            display: flex;
            justify-content: space-around;
            box-shadow: 0 25px 40px -15px rgba(0, 0, 0, 0.2), 0 2px 8px -4px rgba(0, 0, 0, 0.05), inset 0 -2px 0 rgba(0,0,0,0.02);
            border: 1px solid rgba(0, 0, 0, 0.02);
            z-index: 1000;
        }

        .nav-item-bottom {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #8b93a6;
            text-decoration: none;
            font-size: 0.7rem;
            font-weight: 500;
            flex: 1;
            padding: 12px 0;
            border-radius: 24px;
            transition: all 0.2s;
        }

        .nav-item-bottom.active {
            background: #f8f9fc;
            color: #2e3440;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.02), 0 2px 4px -2px rgba(0,0,0,0.05);
        }

        .nav-icon-bottom {
            font-size: 1.5rem;
            margin-bottom: 4px;
        }

        /* BUTTONS */
        .suggest-button {
            position: fixed;
            bottom: 100px;
            right: 20px;
            width: 60px;
            height: 60px;
            border-radius: 20px;
            background: #ffffff;
            color: #2e3440;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 20px 30px -8px rgba(0, 0, 0, 0.15), 0 2px 8px -4px rgba(0, 0, 0, 0.05), inset 0 -2px 0 rgba(0,0,0,0.02);
            border: 1px solid rgba(0, 0, 0, 0.02);
            z-index: 999;
            transition: transform 0.2s;
        }

        .suggest-button:hover {
            transform: translateY(-4px);
        }

        /* MODAL */
        .suggest-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(8px);
            z-index: 10001;
            display: none;
        }

        .suggest-card {
            background: #ffffff;
            border-radius: 32px;
            max-width: 400px;
            width: 90%;
            margin: 80px auto;
            padding: 28px;
            box-shadow: 0 40px 60px -20px rgba(0, 0, 0, 0.3), 0 2px 8px -4px rgba(0, 0, 0, 0.05), inset 0 -2px 0 rgba(0,0,0,0.02);
            border: 1px solid rgba(0, 0, 0, 0.02);
        }

        .suggest-card h3 {
            font-size: 1.2rem;
            font-weight: 600;
            color: #1a1e2b;
            margin-bottom: 20px;
        }

        .suggest-card select,
        .suggest-card input,
        .suggest-card textarea {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 16px;
            margin-bottom: 12px;
            background: #f8f9fc;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.02), inset 0 -2px 4px rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(0, 0, 0, 0.02);
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .suggest-submit {
            flex: 2;
            background: #2e3440;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 10px 15px -5px rgba(46, 52, 64, 0.3), 0 2px 4px -2px rgba(0, 0, 0, 0.05), inset 0 -2px 0 rgba(0,0,0,0.1);
        }

        .suggest-cancel {
            flex: 1;
            background: #f8f9fc;
            color: #1a1e2b;
            border: none;
            padding: 16px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.02), 0 2px 4px -2px rgba(0,0,0,0.05);
        }

        /* MESSAGES */
        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 16px 24px;
            border-radius: 20px;
            color: white;
            font-weight: 500;
            z-index: 10002;
            animation: slideIn 0.2s;
            box-shadow: 0 20px 30px -8px rgba(0, 0, 0, 0.2), 0 2px 8px -4px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255,255,255,0.1);
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .message.success { background: #2e3440; }
        .message.error { background: #c0392b; }

        .loader {
            border: 3px solid #f0f2f5;
            border-top: 3px solid #2e3440;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* RATING LIST */
        .rating-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .rating-item {
            display: flex;
            align-items: center;
            padding: 12px;
            background: #f8f9fc;
            border-radius: 16px;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.02), 0 2px 4px -2px rgba(0,0,0,0.05);
            border: 1px solid rgba(0, 0, 0, 0.02);
        }

        .rating-position {
            width: 30px;
            height: 30px;
            background: #2e3440;
            color: white;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.8rem;
            margin-right: 12px;
        }

        .rating-avatar {
            width: 36px;
            height: 36px;
            border-radius: 12px;
            object-fit: cover;
            margin-right: 12px;
        }

        .rating-info {
            flex: 1;
        }

        .rating-name {
            font-weight: 600;
            font-size: 0.9rem;
            color: #1a1e2b;
        }

        .rating-score {
            font-weight: 600;
            color: #2e3440;
            background: #f0f2f5;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.8rem;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.02);
        }

        /* RESPONSIVE */
        @media (max-width: 600px) {
            body {
                padding: 16px 0;

                flex-direction: column;
            }
            
            .verification-input-group {
                flex-direction: column;
            }
            
            .stats-container {
                flex-direction: row;
            }
        }

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ============================================
        // SUPABASE КОНФИГ
        // ============================================
        const SUPABASE_URL = 'https://wdcwxvxkvyncybsefotj.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_VMEPI3FAZoKDgX4ae_pqcg_Euvs40hM';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ============================================
        // ПЕРЕМЕННЫЕ
        // ============================================
        let allCandidates = [];
        let currentPair = [];
        let selectedCandidateId = null;
        let userIp = null;
        let userVotes = {};
        let userVoteCount = 0;
        let comboCount = 0;
        let lastCommentTime = null;
        let comments = [];
        let verifiedUser = null;
        let polls = [];
        let votedPolls = new Set();
        let lastPollTime = 0;

        const randomNames = ['Аноним'];

        // ============================================
        // ПОЛУЧЕНИЕ IP
        // ============================================
        async function getUserIp() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                userIp = data.ip;
                return userIp;
            } catch {
                userIp = 'user-' + Math.random().toString(36).substring(2, 10);
                return userIp;
            }
        }

        // ============================================
        // ПОКАЗ СООБЩЕНИЙ
        // ============================================
        function showMessage(text, type) {
            const container = document.getElementById('messageContainer');
            const msg = document.createElement('div');
            msg.className = `message ${type}`;
            msg.textContent = text;
            container.appendChild(msg);
            setTimeout(() => msg.remove(), 3000);
        }

        // ============================================
        // ЭКРАНИРОВАНИЕ HTML
        // ============================================
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ============================================
        // ЗАГРУЗКА ОПРОСОВ
        // ============================================
        async function loadPolls() {
            try {
                const { data, error } = await supabaseClient
                    .from('polls')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                polls = data || [];
                await loadVotedPolls();
                displayPolls();
                
            } catch (error) {
                console.error('Ошибка загрузки опросов:', error);
            }
        }

        async function loadVotedPolls() {
            if (!userIp) return;
            
            try {
                const { data, error } = await supabaseClient
                    .from('poll_votes')
                    .select('poll_id')
                    .eq('ip_address', userIp);

                if (error) throw error;

                votedPolls.clear();
                data?.forEach(v => votedPolls.add(v.poll_id));
                
            } catch (error) {
                console.error('Ошибка загрузки голосований:', error);
            }
        }

        function displayPolls() {
            const pollsList = document.getElementById('pollsList');
            if (!pollsList) return;
            
            if (!polls || polls.length === 0) {
                pollsList.innerHTML = `
                    <div style="text-align:center; padding:30px; color:#8e8e8e;">
                        <div style="font-size:36px; margin-bottom:10px;">📊</div>
                        <p>Пока нет опросов</p>
                    </div>
                `;
                return;
            }

            let html = '';
            polls.forEach(poll => {
                const totalVotes = (poll.yes_votes || 0) + (poll.no_votes || 0);
                const yesPercent = totalVotes > 0 ? Math.round((poll.yes_votes / totalVotes) * 100) : 50;
                const noPercent = totalVotes > 0 ? Math.round((poll.no_votes / totalVotes) * 100) : 50;
                const hasVoted = votedPolls.has(poll.id);
                
                html += `
                    <div class="create-poll" style="border-top: 1px solid #dbdbdb;">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 12px;">
                            <span style="font-weight: 500;">${escapeHtml(poll.question)}</span>
                            <span style="color: #8e8e8e;">👤 ${escapeHtml(poll.author || 'Аноним')}</span>
                        </div>
                        
                        <div style="color: #8e8e8e; font-size: 0.8rem; margin-bottom: 12px;">Всего голосов: ${totalVotes}</div>
                        
                        <div style="display: flex; gap: 8px; margin-bottom: 12px;">
                            <div onclick="${!hasVoted ? `vote(${poll.id}, 'yes')` : ''}" 
                                 style="flex: 1; text-align: center; padding: 12px; border: 1px solid #dbdbdb; border-radius: 8px; cursor: ${hasVoted ? 'default' : 'pointer'}; background: ${hasVoted ? '#fafafa' : 'white'}">
                                <div style="font-weight: 600;">✅ ДА</div>
                                <div style="font-size: 1.2rem; font-weight: 600;">${yesPercent}%</div>
                                <div style="font-size: 0.7rem; color: #8e8e8e;">${poll.yes_votes || 0}</div>
                            </div>
                            
                            <div onclick="${!hasVoted ? `vote(${poll.id}, 'no')` : ''}" 
                                 style="flex: 1; text-align: center; padding: 12px; border: 1px solid #dbdbdb; border-radius: 8px; cursor: ${hasVoted ? 'default' : 'pointer'}; background: ${hasVoted ? '#fafafa' : 'white'}}">
                                <div style="font-weight: 600;">❌ НЕТ</div>
                                <div style="font-size: 1.2rem; font-weight: 600;">${noPercent}%</div>
                                <div style="font-size: 0.7rem; color: #8e8e8e;">${poll.no_votes || 0}</div>
                            </div>
                        </div>
                        
                        <div style="height: 4px; background: #dbdbdb; border-radius: 2px; overflow: hidden; display: flex;">
                            <div style="width: ${yesPercent}%; background: #4a6fa5;"></div>
                            <div style="width: ${noPercent}%; background: #c0392b;"></div>
                        </div>
                    </div>
                `;
            });
            
            pollsList.innerHTML = html;
        }

        window.vote = async function(pollId, choice) {
            if (votedPolls.has(pollId)) {
                showMessage('Вы уже голосовали', 'error');
                return;
            }

            try {
                const poll = polls.find(p => p.id === pollId);
                
                if (choice === 'yes') {
                    await supabaseClient
                        .from('polls')
                        .update({ yes_votes: (poll.yes_votes || 0) + 1 })
                        .eq('id', pollId);
                    poll.yes_votes = (poll.yes_votes || 0) + 1;
                } else {
                    await supabaseClient
                        .from('polls')
                        .update({ no_votes: (poll.no_votes || 0) + 1 })
                        .eq('id', pollId);
                    poll.no_votes = (poll.no_votes || 0) + 1;
                }

                await supabaseClient
                    .from('poll_votes')
                    .insert({
                        poll_id: pollId,
                        ip_address: userIp,
                        choice: choice
                    });

                votedPolls.add(pollId);
                displayPolls();
                showMessage('✅ Голос учтён!', 'success');
                
            } catch (error) {
                showMessage('Ошибка: ' + error.message, 'error');
            }
        };

        document.getElementById('createPollBtn').addEventListener('click', async function() {
            const question = document.getElementById('pollQuestion').value.trim();
            
            if (!question) {
                showMessage('Введите вопрос', 'error');
                return;
            }

            const now = Date.now();
            if (now - lastPollTime < 30000) {
                showMessage('Подождите 30 секунд', 'error');
                return;
            }

            try {
                if (!userIp) await getUserIp();

                const { data, error } = await supabaseClient
                    .from('polls')
                    .insert({
                        question: question,
                        author: verifiedUser || 'Аноним',
                        ip_address: userIp,
                        yes_votes: 0,
                        no_votes: 0
                    })
                    .select()
                    .single();

                if (error) throw error;

                polls.unshift(data);
                lastPollTime = now;
                document.getElementById('pollQuestion').value = '';
                displayPolls();
                showMessage('✅ Опрос создан!', 'success');
                
            } catch (error) {
                showMessage('Ошибка: ' + error.message, 'error');
            }
        });

        // ============================================
        // ЗАГРУЗКА КОММЕНТАРИЕВ
        // ============================================
        async function loadComments() {
            try {
                const { data, error } = await supabaseClient
                    .from('comments')
                    .select('*')
                    .order('created_at', { ascending: false })
                    .limit(20);

                if (error) throw error;
                comments = data || [];
                displayComments();
            } catch (error) {
                console.error('Ошибка загрузки комментариев:', error);
            }
        }

        function displayComments() {
            const list = document.getElementById('commentsList');
            
            if (!comments || comments.length === 0) {
                list.innerHTML = '<div style="text-align:center; color:#8e8e8e;">Нет комментариев</div>';
                return;
            }

            let html = '';
            comments.forEach(comment => {
                const date = new Date(comment.created_at).toLocaleString('ru', {
                    day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit'
                });
                
                html += `
                    <div class="comment-item ${comment.is_verified ? 'verified-comment' : ''}">
                        <div class="comment-header">
                            <span class="comment-name">${escapeHtml(comment.name || 'Аноним')}</span>
                            <span class="comment-date">${date}</span>
                        </div>
                        <div class="comment-message">${escapeHtml(comment.message)}</div>
                    </div>
                `;
            });
            list.innerHTML = html;
        }

        document.getElementById('submitComment').addEventListener('click', submitComment);

        async function submitComment() {
            const nameInput = document.getElementById('commentName');
            const messageInput = document.getElementById('commentMessage');
            
            let name = nameInput.value.trim();
            let message = messageInput.value.trim();

            if (lastCommentTime && (Date.now() - lastCommentTime) < 5000) {
                showMessage('Подождите 5 секунд', 'error');
                return;
            }

            if (!name) name = randomNames[Math.floor(Math.random() * randomNames.length)];
            if (!message) {
                showMessage('Напишите комментарий', 'error');
                return;
            }

            try {
                const commentData = {
                    name: name,
                    message: message,
                    ip_address: userIp,
                    is_verified: !!verifiedUser
                };

                const { error } = await supabaseClient
                    .from('comments')
                    .insert(commentData);

                if (error) throw error;

                lastCommentTime = Date.now();
                nameInput.value = '';
                messageInput.value = '';
                
                showMessage('Комментарий добавлен!', 'success');
                await loadComments();
                
            } catch (error) {
                showMessage('Ошибка: ' + error.message, 'error');
            }
        }

        // ============================================
        // ВЕРИФИКАЦИЯ
        // ============================================
        document.getElementById('verifyBtn').addEventListener('click', verifyUser);

        async function verifyUser() {
            const username = document.getElementById('verifyUsername').value.trim();
            const password = document.getElementById('verifyPassword').value.trim();
            
            if (!username || !password) {
                showMessage('Введите ник и пароль', 'error');
                return;
            }
            
            try {
                const { data, error } = await supabaseClient
                    .from('verified_users')
                    .select('*')
                    .eq('username', username)
                    .eq('password', password)
                    .single();
                
                if (error || !data) {
                    showMessage('Неверный ник или пароль', 'error');
                    return;
                }
                
                verifiedUser = username;
                
                document.getElementById('verifyStatus').classList.add('active');
                document.getElementById('verifyStatusText').innerHTML = `Вы вошли как <strong>${username}</strong>`;
                
                document.getElementById('verifyUsername').value = '';
                document.getElementById('verifyPassword').value = '';
                
                showMessage('Верификация успешна!', 'success');
                
            } catch (error) {
                showMessage('Ошибка: ' + error.message, 'error');
            }
        }

        window.logoutVerification = function() {
            verifiedUser = null;
            document.getElementById('verifyStatus').classList.remove('active');
            showMessage('Вы вышли', 'success');
        }

        // ============================================
        // КАНДИДАТЫ (старый код)
        // ============================================
        async function loadCandidates() {
            try {
                const { data, error } = await supabaseClient
                    .from('candidates')
                    .select('*')
                    .order('votes', { ascending: false });

                if (error) throw error;

                allCandidates = (data || []).map(c => ({
                    ...c,
                    rarity: getRandomRarity()
                }));

                if (allCandidates.length < 2) return;

                document.getElementById('battleContainer').style.display = 'block';
                document.getElementById('ratingContainer').style.display = 'block';
                
                updateLeaderboard();
                selectNewPair();
            } catch (err) {
                console.error(err);
            }
        }

        function getRandomRarity() {
            const rand = Math.random();
            if (rand < 0.5) return 'common';
            if (rand < 0.75) return 'rare';
            if (rand < 0.9) return 'epic';
            return 'legendary';
        }

        const rarityNames = { common: 'Обычная', rare: 'Редкая', epic: 'Эпическая', legendary: 'Легендарная' };

        async function loadUserVotes() {
            if (!userIp) return;
            
            try {
                const { data } = await supabaseClient
                    .from('votes')
                    .select('candidate_id')
                    .eq('ip_address', userIp);

                if (data) {
                    userVotes = {};
                    data.forEach(vote => {
                        userVotes[vote.candidate_id] = true;
                    });
                    userVoteCount = data.length;
                    document.getElementById('voteCountBadge').textContent = userVoteCount;
                }
            } catch (error) {
                console.error(error);
            }
        }

        function selectNewPair() {
            if (allCandidates.length < 2) return;
            
            const available = allCandidates.filter(c => !userVotes[c.id]);
            
            if (available.length >= 2) {
                let first, second;
                do {
                    const shuffled = [...available].sort(() => 0.5 - Math.random());
                    first = shuffled[0];
                    second = shuffled[1];
                } while (first.id === second.id);
                currentPair = [first, second];
            } else {
                const shuffled = [...allCandidates].sort(() => 0.5 - Math.random());
                currentPair = [shuffled[0], shuffled[1]];
            }
            
            renderBattle(currentPair);
            updatePrediction();
        }

        function renderBattle(pair) {
            const container = document.getElementById('battleGrid');
            if (!container) return;
            
            container.innerHTML = `
                <div class="candidate-card ${userVotes[pair[0].id] ? 'voted' : ''}" onclick="selectCandidate(${pair[0].id})" id="card-${pair[0].id}">
                    <span class="rarity-badge rarity-${pair[0].rarity}">${rarityNames[pair[0].rarity]}</span>
                    <img src="${pair[0].photo_url || 'https://i.pravatar.cc/300'}" class="candidate-photo">
                    <div class="candidate-info">
                        <div class="candidate-name">${pair[0].name}</div>
                        <span class="rating">❤️ ${pair[0].votes || 0}</span>
                    </div>
                </div>
                
                <div class="candidate-card ${userVotes[pair[1].id] ? 'voted' : ''}" onclick="selectCandidate(${pair[1].id})" id="card-${pair[1].id}">
                    <span class="rarity-badge rarity-${pair[1].rarity}">${rarityNames[pair[1].rarity]}</span>
                    <img src="${pair[1].photo_url || 'https://i.pravatar.cc/300'}" class="candidate-photo">
                    <div class="candidate-info">
                        <div class="candidate-name">${pair[1].name}</div>
                        <span class="rating">❤️ ${pair[1].votes || 0}</span>
                    </div>
                </div>
            `;
            
            selectedCandidateId = null;
        }

        window.selectCandidate = function(id) {
            if (userVotes[id]) return;
            document.querySelectorAll('.candidate-card').forEach(c => c.classList.remove('selected'));
            const card = document.getElementById(`card-${id}`);
            if (card) card.classList.add('selected');
            selectedCandidateId = id;
        };

        function updatePrediction() {
            if (!currentPair || currentPair.length < 2) return;
            
            const total = (currentPair[0].votes || 0) + (currentPair[1].votes || 0);
            const left = total ? Math.round((currentPair[0].votes / total) * 100) : 50;
            const right = 100 - left;
            
            const bars = document.getElementById('predictionBars');
            if (!bars) return;
            
            bars.innerHTML = `
                <div class="prediction-bar">
                    <div class="prediction-fill" style="width: ${left}%;">${left}%</div>
                </div>
                <div class="prediction-bar">
                    <div class="prediction-fill" style="width: ${right}%;">${right}%</div>
                </div>
            `;
        }

        document.getElementById('voteBtn').addEventListener('click', async function() {
            if (!selectedCandidateId) {
                showMessage('Выберите кандидата', 'error');
                return;
            }
            
            const winner = currentPair.find(c => c.id === selectedCandidateId);
            const loser = currentPair.find(c => c.id !== selectedCandidateId);
            
            if (!winner || !loser) return;
            
            if (userVotes[winner.id]) {
                showMessage('Вы уже голосовали', 'error');
                return;
            }

            try {
                const newWinnerVotes = (winner.votes || 0) + 100;
                const newLoserVotes = Math.max(0, (loser.votes || 0) - 50);

                await Promise.all([
                    supabaseClient.from('candidates').update({ votes: newWinnerVotes }).eq('id', winner.id),
                    supabaseClient.from('candidates').update({ votes: newLoserVotes }).eq('id', loser.id),
                    supabaseClient.from('votes').insert({
                        candidate_id: winner.id,
                        ip_address: userIp,
                        user_agent: navigator.userAgent
                    })
                ]);

                winner.votes = newWinnerVotes;
                loser.votes = newLoserVotes;
                userVotes[winner.id] = true;
                userVoteCount++;
                
                document.getElementById('voteCountBadge').textContent = userVoteCount;
                
                if (userVoteCount >= 1) document.getElementById('ach1').classList.add('unlocked');
                
                updateLeaderboard();
                showMessage(`✅ +100 ${winner.name}!`, 'success');
                
                selectedCandidateId = null;
                selectNewPair();
                
            } catch (err) {
                showMessage('Ошибка: ' + err.message, 'error');
            }
        });

        function updateLeaderboard() {
            const sorted = [...allCandidates].sort((a, b) => (b.votes || 0) - (a.votes || 0));
            const container = document.getElementById('ratingList');
            if (!container) return;
            
            let html = '';
            sorted.slice(0, 10).forEach((c, index) => {
                html += `
                    <div class="rating-item" style="display: flex; align-items: center; padding: 8px; border-bottom: 1px solid #dbdbdb;">
                        <div style="width: 24px; height: 24px; background: #4a6fa5; color: white; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; margin-right: 10px;">${index + 1}</div>
                        <img src="${c.photo_url || 'https://i.pravatar.cc/300'}" style="width: 32px; height: 32px; border-radius: 8px; margin-right: 10px;">
                        <div style="flex: 1; font-weight: 500;">${c.name}</div>
                        <div style="color: #4a6fa5;">❤️ ${c.votes || 0}</div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        // ============================================
        // КНОПКА СВЯЗИ
        // ============================================
        const adminBtn = document.getElementById('adminBtn');
        const adminModal = document.getElementById('adminModal');
        const adminCancel = document.getElementById('adminCancel');
        const adminSubmit = document.getElementById('adminSubmit');

        adminBtn?.addEventListener('click', () => {
            adminModal.style.display = 'block';
        });

        adminCancel?.addEventListener('click', () => {
            adminModal.style.display = 'none';
        });

        adminModal?.addEventListener('click', (e) => {
            if (e.target === adminModal) {
                adminModal.style.display = 'none';
            }
        });

        adminSubmit?.addEventListener('click', async () => {
            const name = document.getElementById('adminName').value.trim() || 'Аноним';
            const message = document.getElementById('adminMessage').value.trim();
            
            if (!message) {
                showMessage('Напишите сообщение', 'error');
                return;
            }

            try {
                await supabaseClient
                    .from('feedback')
                    .insert({
                        type: 'admin_message',
                        name: name,
                        message: message,
                        ip_address: userIp,
                        user_agent: navigator.userAgent
                    });
                
                showMessage('✅ Сообщение отправлено', 'success');
                adminModal.style.display = 'none';
                document.getElementById('adminName').value = '';
                document.getElementById('adminMessage').value = '';
                
            } catch (error) {
                showMessage('Ошибка: ' + error.message, 'error');
            }
        });

        // ============================================
        // ИНИЦИАЛИЗАЦИЯ
        // ============================================
        async function initApp() {
            await getUserIp();
            await loadUserVotes();
            await loadCandidates();
            await loadComments();
            await loadPolls();
            
            document.getElementById('onlineCount').textContent = Math.floor(Math.random() * 50) + 50;
        }

        initApp();
    </script>
</body>
</html>
