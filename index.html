<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>СТЕНА 62 ШКОЛЫ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background: #f8f9fc;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 32px 0;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: #f8f9fc;
            position: relative;
            padding: 0 16px;
        }

        /* MAIN CONTENT */
        .main-content {
            display: block;
            padding-bottom: 90px;
        }

        /* HEADER с логотипом */
        .header {
            background: #ffffff;
            border-radius: 24px;
            padding: 16px 20px;
            margin: 8px 0 24px 0;
            box-shadow: 0 10px 20px -8px rgba(0, 0, 0, 0.1), 0 2px 4px 0 rgba(0, 0, 0, 0.02), inset 0 -2px 0 rgba(0,0,0,0.02);
            border: 1px solid rgba(0, 0, 0, 0.02);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo img {
            height: 32px;
            width: auto;
        }

        .logo h1 {
            font-size: 1.4rem;
            font-weight: 600;
            color: #1a1e2b;
            letter-spacing: -0.5px;
        }

        .logo span {
            color: #8b93a6;
            font-size: 0.8rem;
            font-weight: 400;
            margin-left: 4px;
        }

        .header-icons {
            display: flex;
            gap: 16px;
        }

        .header-icon {
            font-size: 1.2rem;
            color: #2e3440;
            opacity: 0.6;
            transition: opacity 0.2s;
        }

        .header-icon:hover {
            opacity: 1;
        }

        /* STORIES - с logotype.png на месте аватарок */
        .stories-container {
            margin-bottom: 24px;
        }

        .stories-scroll {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            scrollbar-width: none;
            padding: 4px 0;
        }

        .stories-scroll::-webkit-scrollbar {
            display: none;
        }

        .story-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            min-width: 64px;
            cursor: pointer;
        }

        .story-avatar {
            width: 64px;
            height: 64px;
            border-radius: 20px;
            background: #ffffff;
            padding: 3px;
            box-shadow: 0 12px 20px -8px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(0,0,0,0.02);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .story-avatar img {
            width: 100%;
            height: 100%;
            border-radius: 17px;
            object-fit: cover;
        }

        .story-name {
            font-size: 0.65rem;
            font-weight: 500;
            color: #2e3440;
            opacity: 0.7;
        }

        /* QUICK NOTIFICATIONS - с logotype.png в иконках статусов */
        .quick-notifications {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            scrollbar-width: none;
            margin-bottom: 24px;
            padding: 4px 0;
        }

        .quick-notifications::-webkit-scrollbar {
            display: none;
        }

        .notification-badge {
            background: #ffffff;
            border-radius: 30px;
            padding: 8px 16px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #1a1e2b;
            white-space: nowrap;
            box-shadow: 0 6px 12px -6px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(0, 0, 0, 0.02);
            display: flex;
            align-items: center;
            gap: 6px;
            transition: transform 0.2s;
        }

        .notification-badge:hover {
            transform: translateY(-1px);
        }

        .notification-badge.highlight {
            background: #2e3440;
            color: white;
        }

        .status-icon {
            width: 16px;
            height: 16px;
            border-radius: 4px;
        }

        /* PROMO БЛОК для голосований */
        .promo-block {
            background: #ffffff;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 24px;
            box-shadow: 0 15px 25px -10px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(0, 0, 0, 0.02);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .promo-text {
            flex: 1;
        }

        .promo-text p {
            font-size: 0.9rem;
            color: #8b93a6;
            margin-bottom: 4px;
        }

        .promo-text a {
            font-weight: 600;
            color: #2e3440;
            text-decoration: none;
            font-size: 0.95rem;
            border-bottom: 1px dashed #2e3440;
            padding-bottom: 2px;
        }

        .promo-icon {
            font-size: 2rem;
            color: #2e3440;
            opacity: 0.3;
            margin-left: 16px;
        }

        /* STATS */
        .stats-container {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .stat-item {
            flex: 1;
            background: #ffffff;
            border-radius: 18px;
            padding: 14px;
            text-align: center;
            box-shadow: 0 10px 18px -8px rgba(0, 0, 0, 0.06);
            border: 1px solid rgba(0, 0, 0, 0.02);
        }

        .stat-value {
            font-weight: 600;
            font-size: 1.4rem;
            color: #1a1e2b;
            line-height: 1;
            margin-bottom: 2px;
        }

        .stat-label {
            font-size: 0.65rem;
            color: #8b93a6;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.2px;
        }

        /* COMMENTS SECTION */
        .comments-section {
            background: #ffffff;
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(0, 0, 0, 0.02);
        }

        .comments-section h3 {
            font-size: 0.85rem;
            font-weight: 600;
            color: #8b93a6;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-bottom: 20px;
        }

        .comment-form {
            margin-bottom: 24px;
        }

        .comment-input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .comment-input,
        .comment-textarea {
            width: 100%;
            padding: 14px 18px;
            border: none;
            border-radius: 18px;
            font-size: 0.9rem;
            background: #f8f9fc;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(0, 0, 0, 0.02);
        }

        .comment-textarea {
            min-height: 80px;
            resize: none;
        }

        .comment-submit {
            background: #2e3440;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
            width: fit-content;
            margin-top: 10px;
            box-shadow: 0 6px 12px -4px rgba(46, 52, 64, 0.2);
            transition: transform 0.2s;
        }

        .comment-submit:hover {
            transform: translateY(-1px);
        }

        /* COMMENTS LIST */
        .comments-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 500px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .comment-item {
            background: #f8f9fc;
            border-radius: 18px;
            padding: 16px;
            box-shadow: 0 4px 8px -4px rgba(0,0,0,0.04);
            border: 1px solid rgba(0, 0, 0, 0.02);
            transition: transform 0.2s;
            position: relative;
        }

        .comment-item:hover {
            transform: translateX(2px);
        }

        .comment-item.verified {
            border-left: 3px solid #4a6fa5;
            background: #f0f4fa;
        }

        .comment-item.premium {
            border-left: 3px solid #f1c40f;
            background: #fef9e7;
        }

        .comment-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            position: relative;
        }

        .comment-name-wrapper {
            position: relative;
            display: inline-block;
            cursor: pointer;
        }

        .comment-name {
            font-weight: 600;
            font-size: 0.9rem;
            color: #1a1e2b;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* MINI PROFILE CARD - с logotype.png */
        .mini-profile-card {
            position: absolute;
            bottom: 100%;
            left: 0;
            background: white;
            border-radius: 20px;
            padding: 16px;
            width: 240px;
            box-shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(0, 0, 0, 0.02);
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s;
            pointer-events: none;
            margin-bottom: 8px;
        }

        .comment-name-wrapper:hover .mini-profile-card {
            opacity: 1;
            visibility: visible;
            pointer-events: all;
        }

        .mini-profile-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .mini-avatar {
            width: 48px;
            height: 48px;
            border-radius: 16px;
            object-fit: cover;
            background: #f8f9fc;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mini-info h4 {
            font-size: 1rem;
            font-weight: 600;
            color: #1a1e2b;
            margin-bottom: 2px;
        }

        .mini-info p {
            font-size: 0.7rem;
            color: #8b93a6;
        }

        .mini-stats {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
            padding: 8px 0;
            border-top: 1px solid #f0f2f5;
            border-bottom: 1px solid #f0f2f5;
        }

        .mini-stat {
            flex: 1;
            text-align: center;
        }

        .mini-stat-value {
            font-weight: 600;
            font-size: 0.9rem;
            color: #1a1e2b;
        }

        .mini-stat-label {
            font-size: 0.6rem;
            color: #8b93a6;
        }

        .mini-profile-link {
            display: block;
            background: #f8f9fc;
            color: #1a1e2b;
            text-decoration: none;
            padding: 8px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 500;
            text-align: center;
            transition: background 0.2s;
        }

        .mini-profile-link:hover {
            background: #eef2f5;
        }

        .premium-badge {
            display: inline-flex;
            align-items: center;
            gap: 2px;
            background: #f1c40f;
            color: #1a1e2b;
            padding: 2px 8px;
            border-radius: 30px;
            font-size: 0.6rem;
            font-weight: 600;
        }

        .verified-badge {
            display: inline-flex;
            align-items: center;
            gap: 2px;
            background: #4a6fa5;
            color: white;
            padding: 2px 8px;
            border-radius: 30px;
            font-size: 0.6rem;
            font-weight: 600;
        }

        .comment-date {
            font-size: 0.65rem;
            color: #8b93a6;
        }

        .comment-message {
            font-size: 0.9rem;
            color: #1a1e2b;
            line-height: 1.5;
        }

        /* PRIME СТАТУС */
        .prime-status-bar {
            background: #ffffff;
            border-radius: 40px;
            padding: 12px 20px;
            margin-bottom: 20px;
            box-shadow: 0 6px 12px -6px rgba(0, 0, 0, 0.06);
            border: 1px solid rgba(0, 0, 0, 0.02);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .prime-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .prime-info i {
            color: #f1c40f;
            font-size: 1.1rem;
        }

        .prime-info span {
            font-size: 0.85rem;
            color: #1a1e2b;
            font-weight: 500;
        }

        .prime-logout {
            background: none;
            border: none;
            color: #8b93a6;
            font-size: 0.75rem;
            cursor: pointer;
            text-decoration: underline;
            padding: 4px 8px;
        }

        /* BOTTOM NAVIGATION */
        .bottom-nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            max-width: 560px;
            width: calc(100% - 32px);
            background: #ffffff;
            border-radius: 40px;
            padding: 6px;
            display: flex;
            justify-content: space-around;
            box-shadow: 0 15px 25px -10px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(0, 0, 0, 0.02);
            z-index: 1000;
        }

        .nav-item-bottom {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #8b93a6;
            text-decoration: none;
            font-size: 0.6rem;
            font-weight: 500;
            flex: 1;
            padding: 8px 0;
            border-radius: 30px;
            transition: all 0.2s;
        }

        .nav-item-bottom.active {
            background: #f0f2f5;
            color: #2e3440;
        }

        .nav-icon-bottom {
            font-size: 1.2rem;
            margin-bottom: 2px;
        }

        /* MESSAGES */
        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 40px;
            color: white;
            font-weight: 500;
            font-size: 0.85rem;
            z-index: 10002;
            animation: slideIn 0.2s;
            box-shadow: 0 10px 20px -8px rgba(0, 0, 0, 0.15);
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .message.success { background: #2e3440; }
        .message.error { background: #c0392b; }

        .loader {
            border: 2px solid #f0f2f5;
            border-top: 2px solid #2e3440;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* BUTTONS */
        .suggest-button {
            position: fixed;
            bottom: 100px;
            right: 20px;
            width: 48px;
            height: 48px;
            border-radius: 24px;
            background: #ffffff;
            color: #2e3440;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 10px 18px -6px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(0, 0, 0, 0.02);
            z-index: 999;
            transition: transform 0.2s;
        }

        .suggest-button:hover {
            transform: translateY(-2px);
        }

        /* MODAL */
        .suggest-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(8px);
            z-index: 10001;
            display: none;
        }

        .suggest-card {
            background: #ffffff;
            border-radius: 28px;
            max-width: 400px;
            width: 90%;
            margin: 80px auto;
            padding: 24px;
            box-shadow: 0 30px 40px -15px rgba(0, 0, 0, 0.2);
        }

        .suggest-card h3 {
            font-size: 1rem;
            font-weight: 600;
            color: #1a1e2b;
            margin-bottom: 16px;
        }

        .suggest-card select,
        .suggest-card input,
        .suggest-card textarea {
            width: 100%;
            padding: 12px 16px;
            border: none;
            border-radius: 16px;
            margin-bottom: 10px;
            background: #f8f9fc;
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.02);
            font-size: 0.9rem;
        }

        .modal-buttons {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }

        .suggest-submit {
            flex: 2;
            background: #2e3440;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 30px;
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
        }

        .suggest-cancel {
            flex: 1;
            background: #f0f2f5;
            color: #1a1e2b;
            border: none;
            padding: 12px;
            border-radius: 30px;
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
        }

        /* RESPONSIVE */
        @media (max-width: 600px) {
            body {
                padding: 16px 0;
            }
            
            .promo-block {
                flex-direction: column;
                text-align: center;
                gap: 12px;
            }
            
            .promo-icon {
                margin-left: 0;
            }

            .mini-profile-card {
                width: 200px;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="main-content">
            <!-- Header с логотипом -->
            <div class="header">
                <div class="header-content">
                    <div class="logo">
                        <img src="/logotype.png" alt="62">
                        <h1>стена<span>62</span></h1>
                    </div>
                    <div class="header-icons">
                        <i class="far fa-bell header-icon"></i>
                        <i class="far fa-user header-icon"></i>
                    </div>
                </div>
            </div>

            <!-- Stories с logotype.png на месте аватарок -->
            <div class="stories-container">
                <div class="stories-scroll">
                    <div class="story-item">
                        <div class="story-avatar">
                            <img src="/logotype.png" alt="новости">
                        </div>
                        <span class="story-name">новости</span>
                    </div>
                    <div class="story-item">
                        <div class="story-avatar">
                            <img src="/logotype.png" alt="события">
                        </div>
                        <span class="story-name">события</span>
                    </div>
                    <div class="story-item">
                        <div class="story-avatar">
                            <img src="/logotype.png" alt="опросы">
                        </div>
                        <span class="story-name">опросы</span>
                    </div>
                    <div class="story-item">
                        <div class="story-avatar">
                            <img src="/logotype.png" alt="темки">
                        </div>
                        <span class="story-name">темки</span>
                    </div>
                    <div class="story-item">
                        <div class="story-avatar">
                            <img src="/logotype.png" alt="сливы">
                        </div>
                        <span class="story-name">сливы</span>
                    </div>
                </div>
            </div>

            <!-- Prime статус -->
            <div class="prime-status-bar" id="primeStatusBar" style="display: none;">
                <div class="prime-info">
                    <i class="fas fa-crown"></i>
                    <span id="primeUserName">Prime пользователь</span>
                </div>
                <button class="prime-logout" onclick="logoutPrime()">выйти</button>
            </div>

            <!-- Quick Notifications - с logotype.png в статусах -->
            <div class="quick-notifications">
                <div class="notification-badge highlight">
                    <img src="/logotype.png" class="status-icon" alt="">
                    <span>8 марта</span>
                </div>
                <div class="notification-badge">
                    <img src="/logotype.png" class="status-icon" alt="">
                    <span>prime</span>
                </div>
                <div class="notification-badge">
                    <img src="/logotype.png" class="status-icon" alt="">
                    <span>темки</span>
                </div>
                <div class="notification-badge">
                    <img src="/logotype.png" class="status-icon" alt="">
                    <span>сливы</span>
                </div>
            </div>

            <!-- Promo блок для голосований -->
            <div class="promo-block">
                <div class="promo-text">
                    <p>📊 потеряли голосования?</p>
                    <a href="/votes.html">они теперь в отдельной вкладке →</a>
                </div>
                <div class="promo-icon">📋</div>
            </div>

            <!-- Stats -->
            <div class="stats-container">
                <div class="stat-item">
                    <div class="stat-value" id="commentsCount">0</div>
                    <div class="stat-label">комментарии</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="primeCount">0</div>
                    <div class="stat-label">prime</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="threadsCount">0</div>
                    <div class="stat-label">темки</div>
                </div>
            </div>

            <!-- Comments Section -->
            <div class="comments-section">
                <h3>комментарии</h3>
                
                <div class="comment-form">
                    <div class="comment-input-group">
                        <input type="text" id="commentName" class="comment-input" placeholder="ваше имя" maxlength="30">
                        <textarea id="commentMessage" class="comment-textarea" placeholder="напишите комментарий..." maxlength="200"></textarea>
                    </div>
                    <button class="comment-submit" id="submitComment">отправить</button>
                </div>

                <div class="comments-list" id="commentsList">
                    <div class="loader"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation с правильными путями -->
    <nav class="bottom-nav">
        <a href="/index.html" class="nav-item-bottom active">
            <i class="fas fa-home nav-icon-bottom"></i>
            <span>главная</span>
        </a>
        <a href="/votes.html" class="nav-item-bottom">
            <i class="fas fa-chart-pie nav-icon-bottom"></i>
            <span>голосования</span>
        </a>
        <a href="/threads.html" class="nav-item-bottom">
            <i class="fas fa-comments nav-icon-bottom"></i>
            <span>темки</span>
        </a>
        <a href="/slivy.html" class="nav-item-bottom">
            <i class="fas fa-image nav-icon-bottom"></i>
            <span>сливы</span>
        </a>
        <a href="/account.html" class="nav-item-bottom">
            <i class="fas fa-user nav-icon-bottom"></i>
            <span>аккаунт</span>
        </a>
    </nav>

    <!-- Admin Button -->
    <button class="suggest-button" id="adminBtn">📨</button>

    <!-- Admin Modal -->
    <div class="suggest-modal" id="adminModal">
        <div class="suggest-card">
            <h3>связь с админом</h3>
            
            <select id="adminType">
                <option value="question">❓ вопрос</option>
                <option value="problem">⚠️ проблема</option>
                <option value="suggestion">💡 предложение</option>
            </select>
            
            <input type="text" id="adminName" placeholder="ваше имя">
            <textarea id="adminMessage" placeholder="сообщение..." rows="3"></textarea>
            
            <div class="modal-buttons">
                <button class="suggest-submit" id="adminSubmit">отправить</button>
                <button class="suggest-cancel" id="adminCancel">отмена</button>
            </div>
        </div>
    </div>

    <div id="messageContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ============================================
        // SUPABASE КОНФИГ
        // ============================================
        const SUPABASE_URL = 'https://wdcwxvxkvyncybsefotj.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_VMEPI3FAZoKDgX4ae_pqcg_Euvs40hM';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ============================================
        // ПЕРЕМЕННЫЕ
        // ============================================
        let userIp = null;
        let comments = [];
        let lastCommentTime = 0;
        let primeUser = null;
        let threadsCount = 0;

        // Загружаем Prime статус из localStorage
        const savedPrime = localStorage.getItem('primeUser');
        if (savedPrime) {
            primeUser = JSON.parse(savedPrime);
            document.getElementById('primeStatusBar').style.display = 'flex';
            document.getElementById('primeUserName').textContent = primeUser.name;
        }

        // Имена для случайных комментаторов
        const randomNames = ['Аноним', 'Ученик', 'Школьник', 'Выпускник'];

        // ============================================
        // ПОЛУЧЕНИЕ IP
        // ============================================
        async function getUserIp() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                userIp = data.ip;
                return userIp;
            } catch {
                userIp = 'user-' + Math.random().toString(36).substring(2, 10);
                return userIp;
            }
        }

        // ============================================
        // ПОКАЗ СООБЩЕНИЙ
        // ============================================
        function showMessage(text, type) {
            const container = document.getElementById('messageContainer');
            const msg = document.createElement('div');
            msg.className = `message ${type}`;
            msg.textContent = text;
            container.appendChild(msg);
            setTimeout(() => msg.remove(), 3000);
        }

        // ============================================
        // ЭКРАНИРОВАНИЕ HTML
        // ============================================
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ============================================
        // ПОЛУЧЕНИЕ ДАННЫХ ПОЛЬЗОВАТЕЛЯ
        // ============================================
        async function getUserData(username) {
            try {
                const { data, error } = await supabaseClient
                    .from('users')
                    .select('*')
                    .eq('nickname', username)
                    .single();

                if (error) return null;
                return data;
            } catch {
                return null;
            }
        }

        // ============================================
        // ЗАГРУЗКА КОММЕНТАРИЕВ
        // ============================================
        async function loadComments() {
            try {
                const { data, error } = await supabaseClient
                    .from('comments')
                    .select('*')
                    .order('created_at', { ascending: false })
                    .limit(50);

                if (error) throw error;
                comments = data || [];
                displayComments();
                
                document.getElementById('commentsCount').textContent = comments.length;
                
                // Подсчет Prime пользователей
                const primeCount = comments.filter(c => c.is_prime || c.is_verified).length;
                document.getElementById('primeCount').textContent = primeCount;
                
            } catch (error) {
                console.error('Ошибка загрузки комментариев:', error);
                document.getElementById('commentsList').innerHTML = '<div style="text-align:center; color:#8b93a6;">ошибка загрузки</div>';
            }
        }

        function displayComments() {
            const list = document.getElementById('commentsList');
            
            if (!comments || comments.length === 0) {
                list.innerHTML = '<div style="text-align:center; color:#8b93a6; padding:20px;">нет комментариев</div>';
                return;
            }

            let html = '';
            comments.forEach(comment => {
                const date = new Date(comment.created_at).toLocaleString('ru', {
                    day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit'
                });
                
                let commentClass = 'comment-item';
                let badges = '';
                let userData = {
                    name: comment.name || 'Аноним',
                    comments: Math.floor(Math.random() * 50) + 1,
                    likes: Math.floor(Math.random() * 100)
                };
                
                if (comment.is_prime) {
                    commentClass += ' premium';
                    badges = '<span class="premium-badge"><i class="fas fa-crown"></i> prime</span>';
                } else if (comment.is_verified) {
                    commentClass += ' verified';
                    badges = '<span class="verified-badge"><i class="fas fa-check"></i> verified</span>';
                }
                
                html += `
                    <div class="${commentClass}">
                        <div class="comment-header">
                            <div class="comment-name-wrapper">
                                <span class="comment-name">
                                    ${escapeHtml(comment.name || 'Аноним')}
                                    ${badges}
                                </span>
                                <div class="mini-profile-card">
                                    <div class="mini-profile-header">
                                        <img src="/logotype.png" class="mini-avatar" alt="avatar">
                                        <div class="mini-info">
                                            <h4>${escapeHtml(comment.name || 'Аноним')}</h4>
                                            <p>${badges ? 'prime участник' : 'обычный участник'}</p>
                                        </div>
                                    </div>
                                    <div class="mini-stats">
                                        <div class="mini-stat">
                                            <div class="mini-stat-value">${userData.comments}</div>
                                            <div class="mini-stat-label">комменты</div>
                                        </div>
                                        <div class="mini-stat">
                                            <div class="mini-stat-value">${userData.likes}</div>
                                            <div class="mini-stat-label">лайки</div>
                                        </div>
                                    </div>
                                    <a href="/account.html?user=${encodeURIComponent(comment.name || '')}" class="mini-profile-link">
                                        перейти в профиль →
                                    </a>
                                </div>
                            </div>
                            <span class="comment-date">${date}</span>
                        </div>
                        <div class="comment-message">${escapeHtml(comment.message)}</div>
                    </div>
                `;
            });
            list.innerHTML = html;
        }

        // ============================================
        // ОТПРАВКА КОММЕНТАРИЯ
        // ============================================
        document.getElementById('submitComment').addEventListener('click', submitComment);

        async function submitComment() {
            const nameInput = document.getElementById('commentName');
            const messageInput = document.getElementById('commentMessage');
            
            let name = nameInput.value.trim();
            let message = messageInput.value.trim();

            if (lastCommentTime && (Date.now() - lastCommentTime) < 5000) {
                showMessage('подождите 5 секунд', 'error');
                return;
            }

            if (!name) {
                name = randomNames[Math.floor(Math.random() * randomNames.length)];
            }

            if (!message) {
                showMessage('напишите комментарий', 'error');
                return;
            }

            if (message.length > 200) {
                showMessage('максимум 200 символов', 'error');
                return;
            }

            try {
                const commentData = {
                    name: name,
                    message: message,
                    ip_address: userIp,
                    is_verified: !!primeUser,
                    is_prime: primeUser?.isPrime || false
                };

                const { error } = await supabaseClient
                    .from('comments')
                    .insert(commentData);

                if (error) throw error;

                lastCommentTime = Date.now();
                nameInput.value = '';
                messageInput.value = '';
                
                showMessage('комментарий добавлен!', 'success');
                await loadComments();
                
            } catch (error) {
                showMessage('ошибка: ' + error.message, 'error');
            }
        }

        // ============================================
        // ЗАГРУЗКА КОЛИЧЕСТВА ТРЕДОВ
        // ============================================
        async function loadThreadsCount() {
            try {
                const { count, error } = await supabaseClient
                    .from('threads')
                    .select('*', { count: 'exact', head: true });

                if (error) throw error;
                threadsCount = count || 0;
                document.getElementById('threadsCount').textContent = threadsCount;
            } catch (error) {
                console.error('Ошибка загрузки количества тредов:', error);
                document.getElementById('threadsCount').textContent = '0';
            }
        }

        // ============================================
        // PRIME ЛОГИН
        // ============================================
        window.loginPrime = function(name, isPrime = true) {
            primeUser = { name: name, isPrime: isPrime };
            localStorage.setItem('primeUser', JSON.stringify(primeUser));
            document.getElementById('primeStatusBar').style.display = 'flex';
            document.getElementById('primeUserName').textContent = name;
            showMessage('добро пожаловать в prime!', 'success');
        };

        window.logoutPrime = function() {
            primeUser = null;
            localStorage.removeItem('primeUser');
            document.getElementById('primeStatusBar').style.display = 'none';
            showMessage('вы вышли из prime', 'success');
        };

        // ============================================
        // КНОПКА СВЯЗИ
        // ============================================
        const adminBtn = document.getElementById('adminBtn');
        const adminModal = document.getElementById('adminModal');
        const adminCancel = document.getElementById('adminCancel');
        const adminSubmit = document.getElementById('adminSubmit');

        adminBtn?.addEventListener('click', () => {
            adminModal.style.display = 'block';
        });

        adminCancel?.addEventListener('click', () => {
            adminModal.style.display = 'none';
        });

        adminModal?.addEventListener('click', (e) => {
            if (e.target === adminModal) {
                adminModal.style.display = 'none';
            }
        });

        adminSubmit?.addEventListener('click', async () => {
            const name = document.getElementById('adminName').value.trim() || 'Аноним';
            const message = document.getElementById('adminMessage').value.trim();
            
            if (!message) {
                showMessage('напишите сообщение', 'error');
                return;
            }

            try {
                await supabaseClient
                    .from('feedback')
                    .insert({
                        type: 'admin_message',
                        name: name,
                        message: message,
                        ip_address: userIp,
                        user_agent: navigator.userAgent
                    });
                
                showMessage('✅ сообщение отправлено', 'success');
                adminModal.style.display = 'none';
                document.getElementById('adminName').value = '';
                document.getElementById('adminMessage').value = '';
                
            } catch (error) {
                showMessage('ошибка: ' + error.message, 'error');
            }
        });

        // ============================================
        // ИНИЦИАЛИЗАЦИЯ
        // ============================================
        async function initApp() {
            await getUserIp();
            await loadComments();
            await loadThreadsCount();
        }

        initApp();
    </script>
</body>
</html>
