<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Темки - Школа №62</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple Color Emoji', 'Segoe UI Emoji', 'Segoe UI Symbol', sans-serif !important;
        }

        body {
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 0;
            margin: 0;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: white;
            box-shadow: 0 0 30px rgba(0,0,0,0.05);
            min-height: 100vh;
            position: relative;
        }

        /* Шапка */
        .header {
            background: linear-gradient(145deg, #4a6fa5 0%, #2c3e50 100%);
            border-radius: 24px;
            padding: 12px 20px;
            margin: 16px;
            box-shadow: 0 6px 0 #1a2a3a;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo h1 {
            color: white;
            font-size: 1.3rem;
            font-weight: 700;
            margin: 0;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.2);
        }

        .school-badge {
            background: #ffd966;
            color: #2c3e50;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 700;
            border-bottom: 3px solid #b38f4a;
        }

        .main-nav {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .nav-item {
            position: relative;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            border-bottom: 3px solid rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .nav-item:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.2);
        }

        .nav-item.active {
            background: #ffd966;
            color: #2c3e50;
            border-bottom-color: #b38f4a;
        }

        .nav-icon {
            font-size: 1.1rem;
        }

        /* Премиум индикатор */
        .premium-indicator {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: #f1c40f;
            color: #2c3e50;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-left: 10px;
            border-bottom: 2px solid #b38f4a;
        }

        /* Форма создания темы */
        .create-thread {
            background: white;
            border-radius: 24px;
            padding: 20px;
            margin: 0 16px 20px 16px;
            border: 2px solid #4a6fa5;
            box-shadow: 0 4px 0 #2c3e50;
        }

        .create-thread h3 {
            color: #2c3e50;
            margin-bottom: 15px;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .thread-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 16px;
            font-size: 0.95rem;
            margin-bottom: 10px;
        }

        .thread-input:focus {
            border-color: #4a6fa5;
            outline: none;
        }

        .thread-textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 16px;
            font-size: 0.95rem;
            min-height: 100px;
            margin-bottom: 10px;
            resize: vertical;
            font-family: inherit;
        }

        .thread-textarea:focus {
            border-color: #4a6fa5;
            outline: none;
        }

        .create-btn {
            background: #4a6fa5;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            border-bottom: 4px solid #2c3e50;
            width: 100%;
        }

        .create-btn:active {
            transform: translateY(2px);
            border-bottom-width: 2px;
        }

        .create-btn:disabled {
            background: #95a5a6;
            cursor: not-allowed;
        }

        /* Список тем */
        .threads-list {
            margin: 20px 16px;
        }

        .threads-title {
            color: #2c3e50;
            margin-bottom: 15px;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .thread-item {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 12px;
            border-left: 4px solid #4a6fa5;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: block;
            color: inherit;
        }

        .thread-item:hover {
            transform: translateX(4px);
            background: #eef2f7;
        }

        .thread-item.premium {
            border-left: 4px solid #f1c40f;
            background: #fff9e6;
        }

        .thread-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            flex-wrap: wrap;
            gap: 5px;
        }

        .thread-title {
            font-weight: 700;
            color: #2c3e50;
            font-size: 1.1rem;
        }

        .thread-author {
            font-size: 0.85rem;
            color: #4a6fa5;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .thread-author.premium {
            color: #f1c40f;
            font-weight: 600;
        }

        .thread-meta {
            display: flex;
            gap: 15px;
            color: #7f8c8d;
            font-size: 0.8rem;
            margin-top: 8px;
        }

        .thread-meta span {
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .message {
            position: fixed;
            top: 16px;
            right: 16px;
            padding: 12px 20px;
            border-radius: 30px;
            color: white;
            font-weight: 500;
            z-index: 10002;
            animation: slideIn 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            border-bottom: 4px solid rgba(0,0,0,0.2);
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .message.success { background: #4a6fa5; }
        .message.error { background: #c0392b; }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #4a6fa5;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #7f8c8d;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 15px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Шапка с навигацией -->
        <div class="header">
            <div class="header-content">
                <div class="logo">
                    <h1>ШКОЛЬНАЯ СТЕНА</h1>
                    <span class="school-badge">№62</span>
                </div>
                
                <nav class="main-nav">
                    <a href="index.html" class="nav-item">
                        <span class="nav-icon">🏠</span>
                        <span class="nav-text">Главная</span>
                    </a>
                    
                    <a href="threads.html" class="nav-item active">
                        <span class="nav-icon">💬</span>
                        <span class="nav-text">Темки</span>
                    </a>
                </nav>
            </div>
        </div>

        <!-- Индикатор премиум статуса -->
        <div style="margin: 0 16px 10px 16px; display: flex; justify-content: flex-end;">
            <span id="currentUserPremiumIndicator" style="display: none;" class="premium-indicator">
                <span>👑</span> PREMIUM
            </span>
        </div>

        <!-- Форма создания темы -->
        <div class="create-thread">
            <h3><span>📝</span> Создать новую тему</h3>
            <input type="text" id="threadTitle" class="thread-input" placeholder="Заголовок темы" maxlength="100">
            <textarea id="threadContent" class="thread-textarea" placeholder="Содержание темы..." maxlength="2000"></textarea>
            <button class="create-btn" id="createThreadBtn">➕ СОЗДАТЬ ТЕМУ</button>
        </div>

        <!-- Список тем -->
        <div class="threads-list">
            <div class="threads-title">
                <span style="font-size: 1.3rem;">📋</span> Все темы (<span id="threadsCount">0</span>)
            </div>
            
            <div id="threadsContainer">
                <div class="loader"></div>
            </div>
        </div>
    </div>

    <div id="messageContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://wdcwxvxkvyncybsefotj.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_VMEPI3FAZoKDgX4ae_pqcg_Euvs40hM';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let userIp = null;
        let verifiedUser = null;
        let isPremiumUser = false;

        // Проверяем верифицированного пользователя из localStorage
        const savedPrime = localStorage.getItem('primeUser');
        if (savedPrime) {
            const primeData = JSON.parse(savedPrime);
            verifiedUser = primeData.name;
            isPremiumUser = primeData.isPrime || false;
            
            // Показываем премиум индикатор
            const indicator = document.getElementById('currentUserPremiumIndicator');
            if (indicator) {
                indicator.style.display = 'inline-flex';
            }
        }

        async function getUserIp() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                userIp = data.ip;
                return userIp;
            } catch {
                userIp = 'user-' + Math.random().toString(36).substring(2, 10);
                return userIp;
            }
        }

        function showMessage(text, type) {
            const container = document.getElementById('messageContainer');
            const msg = document.createElement('div');
            msg.className = `message ${type}`;
            msg.textContent = text;
            container.appendChild(msg);
            setTimeout(() => msg.remove(), 3000);
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Загрузка тем
        async function loadThreads() {
            const container = document.getElementById('threadsContainer');
            const countSpan = document.getElementById('threadsCount');
            
            try {
                const { data, error } = await supabaseClient
                    .from('threads')
                    .select('*')
                    .order('bump_time', { ascending: false });
                
                if (error) throw error;
                
                const threads = data || [];
                if (countSpan) countSpan.textContent = threads.length;
                
                if (threads.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">💬</div>
                            <p>Пока нет тем. Создайте первую!</p>
                        </div>
                    `;
                    return;
                }
                
                let html = '';
                threads.forEach(thread => {
                    const date = new Date(thread.created_at).toLocaleString('ru', {
                        day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit'
                    });
                    
                    // Проверяем премиум статус автора
                    const isAuthorPremium = thread.author_prime || false;
                    
                    html += `
                        <a href="thread.html?id=${thread.id}" class="thread-item ${isAuthorPremium ? 'premium' : ''}">
                            <div class="thread-header">
                                <div class="thread-title">${escapeHtml(thread.title || 'Без названия')}</div>
                                <div class="thread-author ${isAuthorPremium ? 'premium' : ''}">
                                    <span>👤</span> ${escapeHtml(thread.author_name || 'Аноним')}
                                    ${isAuthorPremium ? '👑' : ''}
                                </div>
                            </div>
                            <div class="thread-meta">
                                <span><span style="font-size: 1rem;">🕐</span> ${date}</span>
                                <span><span style="font-size: 1rem;">💬</span> ${thread.reply_count || 0}</span>
                                <span><span style="font-size: 1rem;">👁️</span> ${thread.views || 0}</span>
                            </div>
                        </a>
                    `;
                });
                
                container.innerHTML = html;
                
            } catch (error) {
                console.error('Ошибка загрузки тем:', error);
                container.innerHTML = `
                    <div class="empty-state" style="color: #c0392b;">
                        <div class="empty-state-icon">❌</div>
                        <p>Ошибка загрузки тем</p>
                    </div>
                `;
            }
        }

        // Создание новой темы
        async function createThread() {
            const title = document.getElementById('threadTitle').value.trim();
            const content = document.getElementById('threadContent').value.trim();
            
            if (!title) {
                showMessage('Введите заголовок темы', 'error');
                return;
            }
            
            if (!content) {
                showMessage('Введите содержание темы', 'error');
                return;
            }
            
            if (title.length < 3) {
                showMessage('Слишком короткий заголовок', 'error');
                return;
            }
            
            // Блокируем кнопку
            const createBtn = document.getElementById('createThreadBtn');
            createBtn.disabled = true;
            createBtn.textContent = '⏳ СОЗДАНИЕ...';
            
            try {
                if (!userIp) await getUserIp();
                
                const now = new Date().toISOString();
                
                // Сначала создаем запись в threads
                const { data: threadData, error: threadError } = await supabaseClient
                    .from('threads')
                    .insert({
                        title: title,
                        author_name: verifiedUser || 'Аноним',
                        author_prime: isPremiumUser,
                        views: 0,
                        reply_count: 0,
                        bump_time: now,
                        created_at: now,
                        updated_at: now
                    })
                    .select()
                    .single();
                
                if (threadError) {
                    console.error('Ошибка создания темы:', threadError);
                    showMessage('Ошибка: ' + threadError.message, 'error');
                    createBtn.disabled = false;
                    createBtn.textContent = '➕ СОЗДАТЬ ТЕМУ';
                    return;
                }
                
                // Затем создаем первое сообщение в thread_messages
                const { error: messageError } = await supabaseClient
                    .from('thread_messages')
                    .insert({
                        thread_id: threadData.id,
                        content: content,
                        author: verifiedUser || 'Аноним',
                        author_prime: isPremiumUser,
                        ip_address: userIp,
                        user_agent: navigator.userAgent,
                        is_first: true,
                        views: 0,
                        created_at: now,
                        updated_at: now
                    });
                
                if (messageError) {
                    console.error('Ошибка создания сообщения:', messageError);
                    showMessage('Ошибка: ' + messageError.message, 'error');
                } else {
                    // Очищаем поля
                    document.getElementById('threadTitle').value = '';
                    document.getElementById('threadContent').value = '';
                    
                    showMessage('✅ Тема создана!', 'success');
                    
                    // Перезагружаем список тем
                    await loadThreads();
                }
                
            } catch (error) {
                console.error('Ошибка создания темы:', error);
                showMessage('Ошибка: ' + error.message, 'error');
            } finally {
                createBtn.disabled = false;
                createBtn.textContent = '➕ СОЗДАТЬ ТЕМУ';
            }
        }

        // Инициализация
        document.addEventListener('DOMContentLoaded', async () => {
            await getUserIp();
            await loadThreads();
            
            document.getElementById('createThreadBtn').addEventListener('click', createThread);
        });
    </script>
</body>
</html>
