<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>темки - стена 62</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background: #f8f9fc;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 32px 0;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: #f8f9fc;
            position: relative;
            padding: 0 16px 90px 16px;
        }

        /* HEADER */
        .header {
            background: #ffffff;
            border-radius: 24px;
            padding: 16px 20px;
            margin: 8px 0 24px 0;
            box-shadow: 0 10px 20px -8px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(0, 0, 0, 0.02);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: #2e3440;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .logo h1 {
            font-size: 1.4rem;
            font-weight: 600;
            color: #1a1e2b;
            letter-spacing: -0.5px;
        }

        .header-icons {
            display: flex;
            gap: 16px;
        }

        .header-icon {
            font-size: 1.2rem;
            color: #8b93a6;
            transition: color 0.2s;
            cursor: pointer;
        }

        .header-icon:hover {
            color: #2e3440;
        }

        /* NAVIGATION */
        .nav-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .nav-link {
            padding: 8px 16px;
            background: #ffffff;
            border-radius: 30px;
            color: #8b93a6;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            box-shadow: 0 4px 8px -4px rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(0, 0, 0, 0.02);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .nav-link:hover {
            color: #2e3440;
            background: #f0f2f5;
        }

        .nav-link.active {
            background: #2e3440;
            color: white;
        }

        /* CREATE THREAD BUTTON */
        .create-thread-btn {
            width: 100%;
            padding: 16px;
            background: #2e3440;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            margin-bottom: 24px;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .create-thread-btn:hover {
            background: #1a1e2b;
        }

        /* THREADS LIST */
        .threads-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }

        .thread-item {
            background: #ffffff;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 4px 8px -4px rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(0, 0, 0, 0.02);
            transition: transform 0.2s;
            cursor: pointer;
            text-decoration: none;
            display: block;
        }

        .thread-item:hover {
            transform: translateX(2px);
        }

        .thread-item.verified {
            border-left: 3px solid #4a6fa5;
        }

        .thread-item.premium {
            border-left: 3px solid #f1c40f;
        }

        .thread-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .thread-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1a1e2b;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .thread-badge {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            border-radius: 30px;
            font-size: 0.6rem;
            font-weight: 600;
        }

        .badge-verified {
            background: #4a6fa5;
            color: white;
        }

        .badge-premium {
            background: #f1c40f;
            color: #1a1e2b;
        }

        .thread-date {
            color: #8b93a6;
            font-size: 0.7rem;
        }

        .thread-meta {
            display: flex;
            gap: 16px;
            margin-bottom: 12px;
        }

        .thread-meta-item {
            display: flex;
            align-items: center;
            gap: 4px;
            color: #8b93a6;
            font-size: 0.8rem;
        }

        .thread-preview {
            color: #1a1e2b;
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 12px;
            opacity: 0.8;
        }

        .thread-footer {
            display: flex;
            gap: 16px;
            padding-top: 12px;
            border-top: 1px solid #f0f2f5;
        }

        .thread-stat {
            display: flex;
            align-items: center;
            gap: 4px;
            color: #8b93a6;
            font-size: 0.8rem;
        }

        /* PRIME STATUS BAR */
        .prime-status-bar {
            background: #ffffff;
            border-radius: 40px;
            padding: 12px 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 8px -4px rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(0, 0, 0, 0.02);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .prime-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .prime-badge {
            width: 24px;
            height: 24px;
            background: #f1c40f;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.8rem;
        }

        .prime-info span {
            font-size: 0.85rem;
            color: #1a1e2b;
            font-weight: 500;
        }

        .prime-logout {
            background: none;
            border: none;
            color: #8b93a6;
            font-size: 0.75rem;
            cursor: pointer;
            text-decoration: underline;
            padding: 4px 8px;
        }

        .prime-logout:hover {
            color: #2e3440;
        }

        /* BOTTOM NAVIGATION */
        .bottom-nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            max-width: 600px;
            width: calc(100% - 32px);
            background: #ffffff;
            border-radius: 40px;
            padding: 6px;
            display: flex;
            justify-content: space-around;
            box-shadow: 0 10px 20px -8px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(0, 0, 0, 0.02);
            z-index: 1000;
        }

        .nav-item-bottom {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #8b93a6;
            text-decoration: none;
            font-size: 0.6rem;
            font-weight: 500;
            flex: 1;
            padding: 8px 0;
            border-radius: 30px;
            transition: all 0.2s;
        }

        .nav-item-bottom.active {
            background: #f0f2f5;
            color: #2e3440;
        }

        .nav-item-bottom:hover {
            color: #2e3440;
        }

        .nav-icon-bottom {
            font-size: 1.2rem;
            margin-bottom: 2px;
        }

        /* MODAL */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(4px);
            z-index: 10001;
            display: none;
        }

        .modal-card {
            background: #ffffff;
            border-radius: 28px;
            max-width: 400px;
            width: 90%;
            margin: 80px auto;
            padding: 24px;
            box-shadow: 0 25px 35px -15px rgba(0, 0, 0, 0.2);
        }

        .modal-card h3 {
            font-size: 1rem;
            font-weight: 600;
            color: #1a1e2b;
            margin-bottom: 16px;
        }

        .modal-card input,
        .modal-card textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(0, 0, 0, 0.05);
            border-radius: 16px;
            margin-bottom: 12px;
            background: #f8f9fc;
            font-size: 0.9rem;
        }

        .modal-card textarea {
            min-height: 100px;
            resize: vertical;
        }

        .modal-card input:focus,
        .modal-card textarea:focus {
            outline: none;
            border-color: #2e3440;
        }

        .modal-buttons {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }

        .modal-submit {
            flex: 2;
            background: #2e3440;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 30px;
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .modal-submit:hover {
            background: #1a1e2b;
        }

        .modal-cancel {
            flex: 1;
            background: #f0f2f5;
            color: #1a1e2b;
            border: none;
            padding: 12px;
            border-radius: 30px;
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .modal-cancel:hover {
            background: #e4e6e9;
        }

        /* MESSAGES */
        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 30px;
            color: white;
            font-weight: 500;
            font-size: 0.85rem;
            z-index: 10002;
            animation: slideIn 0.2s;
            box-shadow: 0 10px 20px -8px rgba(0, 0, 0, 0.15);
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .message.success { background: #2e3440; }
        .message.error { background: #c0392b; }

        .loader {
            border: 2px solid #f0f2f5;
            border-top: 2px solid #2e3440;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* EMPTY STATE */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #8b93a6;
            background: #ffffff;
            border-radius: 24px;
            border: 1px solid rgba(0, 0, 0, 0.02);
        }

        .empty-state-icon {
            width: 48px;
            height: 48px;
            background: #f0f2f5;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            color: #2e3440;
            font-weight: 600;
        }

        /* ADMIN BUTTON */
        .admin-button {
            position: fixed;
            bottom: 100px;
            right: 50%;
            transform: translateX(calc(300px - 50%));
            width: 48px;
            height: 48px;
            border-radius: 24px;
            background: #ffffff;
            color: #2e3440;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 8px 16px -6px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(0, 0, 0, 0.02);
            z-index: 999;
            transition: transform 0.2s;
        }

        .admin-button:hover {
            transform: translateX(calc(300px - 50%)) translateY(-2px);
        }

        /* RESPONSIVE */
        @media (max-width: 600px) {
            body {
                padding: 16px 0;
            }
            
            .thread-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .admin-button {
                transform: translateX(calc(300px - 50%));
            }
            
            .admin-button:hover {
                transform: translateX(calc(300px - 50%)) translateY(-2px);
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-content">
                <div class="logo">
                    <div class="logo-icon">62</div>
                    <h1>стена</h1>
                </div>
                <div class="header-icons">
                    <i class="far fa-bell header-icon"></i>
                    <i class="far fa-user header-icon"></i>
                </div>
            </div>
        </div>

        <!-- Navigation -->
        <div class="nav-bar">
            <a href="index.html" class="nav-link">
                <i class="fas fa-home"></i>
                главная
            </a>
            <a href="threads.html" class="nav-link active">
                <i class="fas fa-comment"></i>
                темки
            </a>
        </div>

        <!-- Prime Status -->
        <div class="prime-status-bar" id="primeStatusBar" style="display: none;">
            <div class="prime-info">
                <div class="prime-badge">P</div>
                <span id="primeUserName">Prime пользователь</span>
            </div>
            <button class="prime-logout" onclick="logoutPrime()">выйти</button>

        <!-- Create Thread Button -->
        <button class="create-thread-btn" id="createThreadBtn">

    <!-- Create Thread Modal -->
    <div class="modal" id="createThreadModal">
        <div class="modal-card">

            <input type="text" id="threadTitle" placeholder="название темы" maxlength="100">
            <textarea id="threadContent" placeholder="текст сообщения..." maxlength="2000"></textarea>
            <div class="modal-buttons">
                <button class="modal-submit" id="submitThread">создать</button>
                <button class="modal-cancel" id="cancelThread">отмена</button>
            </div>
        </div>
    </div>

    <!-- Admin Modal -->
    <div class="modal" id="adminModal">
        <div class="modal-card">
            <h3>связь с администрацией</h3>
            <select id="adminType">
                <option value="question">вопрос</option>
                <option value="problem">проблема</option>
                <option value="suggestion">предложение</option>
            </select>
            <input type="text" id="adminName" placeholder="ваше имя">
            <textarea id="adminMessage" placeholder="сообщение..." rows="3"></textarea>
            <div class="modal-buttons">
                <button class="modal-submit" id="adminSubmit">отправить</button>
                <button class="modal-cancel" id="adminCancel">отмена</button>
            </div>
        </div>
    </div>

    <!-- Admin Button -->
    <button class="admin-button" id="adminBtn">✎</button>

    <div id="messageContainer"></div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item-bottom">
            <i class="fas fa-home nav-icon-bottom"></i>
            <span>главная</span>
        </a>
        <a href="votes.html" class="nav-item-bottom">
            <i class="fas fa-chart-bar nav-icon-bottom"></i>
            <span>голосования</span>
        </a>
        <a href="threads.html" class="nav-item-bottom active">
            <i class="fas fa-comment nav-icon-bottom"></i>
            <span>темки</span>
        </a>
        <a href="slivy.html" class="nav-item-bottom">
            <i class="fas fa-image nav-icon-bottom"></i>
            <span>сливы</span>
        </a>
        <a href="account.html" class="nav-item-bottom">
            <i class="fas fa-user nav-icon-bottom"></i>
            <span>аккаунт</span>
        </a>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://wdcwxvxkvyncybsefotj.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_VMEPI3FAZoKDgX4ae_pqcg_Euvs40hM';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let userIp = null;
        let primeUser = null;
        let verifiedUser = null;
        let lastThreadTime = 0;

        // Load Prime status from localStorage
        const savedPrime = localStorage.getItem('primeUser');
        if (savedPrime) {
            primeUser = JSON.parse(savedPrime);
            document.getElementById('primeStatusBar').style.display = 'flex';
            document.getElementById('primeUserName').textContent = primeUser.name;
        }

        async function getUserIp() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                userIp = data.ip;
                return userIp;
            } catch {
                userIp = 'user-' + Math.random().toString(36).substring(2, 10);
                return userIp;
            }
        }

        function showMessage(text, type) {
            const container = document.getElementById('messageContainer');
            const msg = document.createElement('div');
            msg.className = `message ${type}`;
            msg.textContent = text;
            container.appendChild(msg);
            setTimeout(() => msg.remove(), 3000);
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function loadThreads() {
            const threadsList = document.getElementById('threadsList');
            
            try {
                const { data, error } = await supabaseClient
                    .from('threads')
                    .select('*')
                    .order('last_activity', { ascending: false });

                if (error) throw error;

                if (!data || data.length === 0) {
                    threadsList.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">💬</div>
                            <p>пока нет тем</p>
                        </div>
                    `;
                    return;
                }

                let html = '';
                data.forEach(thread => {
                    const date = new Date(thread.created_at).toLocaleString('ru', {
                        day: '2-digit', month: '2-digit'
                    });
                    
                    const preview = thread.content?.substring(0, 100) + (thread.content?.length > 100 ? '...' : '');
                    
                    html += `
                        <a href="thread.html?id=${thread.id}" class="thread-item">
                            <div class="thread-header">
                                <div class="thread-title">
                                    ${escapeHtml(thread.title)}
                                </div>
                                <span class="thread-date">${date}</span>
                            </div>
                            <div class="thread-meta">
                                <span class="thread-meta-item">
                                    <i class="far fa-user"></i> ${escapeHtml(thread.author_name || 'Аноним')}
                                </span>
                            </div>
                            <div class="thread-preview">
                                ${escapeHtml(preview)}
                            </div>
                            <div class="thread-footer">
                                <span class="thread-stat">
                                    <i class="far fa-comment"></i> ${thread.reply_count || 0}
                                </span>
                                <span class="thread-stat">
                                    <i class="far fa-eye"></i> ${thread.views || 0}
                                </span>
                            </div>
                        </a>
                    `;
                });
                
                threadsList.innerHTML = html;
                
            } catch (error) {
                console.error('Ошибка загрузки тем:', error);
                threadsList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">!</div>
                        <p>ошибка загрузки</p>
                    </div>
                `;
            }
        }

        async function createThread() {
            const title = document.getElementById('threadTitle').value.trim();
            const content = document.getElementById('threadContent').value.trim();

            if (!title) {
                showMessage('введите название', 'error');
                return;
            }

            if (!content) {
                showMessage('введите текст', 'error');
                return;
            }

            const now = Date.now();
            if (now - lastThreadTime < 30000) {
                showMessage('подождите 30 секунд', 'error');
                return;
            }

            try {
                if (!userIp) await getUserIp();

                const { data, error } = await supabaseClient
                    .from('threads')
                    .insert({
                        title: title,
                        content: content,
                        author_name: primeUser?.name || verifiedUser || 'Аноним',
                        ip_address: userIp,
                        user_agent: navigator.userAgent,
                        views: 0,
                        reply_count: 0,
                        last_activity: new Date().toISOString()
                    })
                    .select()
                    .single();

                if (error) throw error;

                await supabaseClient
                    .from('thread_messages')
                    .insert({
                        thread_id: data.id,
                        content: content,
                        author: primeUser?.name || verifiedUser || 'Аноним',
                        ip_address: userIp,
                        user_agent: navigator.userAgent,
                        is_first: true
                    });

                lastThreadTime = now;
                document.getElementById('createThreadModal').style.display = 'none';
                document.getElementById('threadTitle').value = '';
                document.getElementById('threadContent').value = '';
                
                showMessage('тема создана', 'success');
                loadThreads();
                
            } catch (error) {
                console.error('Ошибка создания темы:', error);
                showMessage('ошибка: ' + error.message, 'error');
            }
        }

        window.logoutPrime = function() {
            primeUser = null;
            localStorage.removeItem('primeUser');
            document.getElementById('primeStatusBar').style.display = 'none';
            showMessage('вы вышли из prime', 'success');
        };

        // Modal functionality
        const adminBtn = document.getElementById('adminBtn');
        const adminModal = document.getElementById('adminModal');
        const adminCancel = document.getElementById('adminCancel');
        const adminSubmit = document.getElementById('adminSubmit');

        adminBtn?.addEventListener('click', () => {
            adminModal.style.display = 'block';
        });

        adminCancel?.addEventListener('click', () => {
            adminModal.style.display = 'none';
            document.getElementById('adminName').value = '';
            document.getElementById('adminMessage').value = '';
        });

        adminModal?.addEventListener('click', (e) => {
            if (e.target === adminModal) {
                adminModal.style.display = 'none';
                document.getElementById('adminName').value = '';
                document.getElementById('adminMessage').value = '';
            }
        });

        adminSubmit?.addEventListener('click', async () => {
            const name = document.getElementById('adminName').value.trim() || 'Аноним';
            const message = document.getElementById('adminMessage').value.trim();
            
            if (!message) {
                showMessage('напишите сообщение', 'error');
                return;
            }

            try {
                await supabaseClient
                    .from('feedback')
                    .insert({
                        type: 'admin_message',
                        name: name,
                        message: message,
                        ip_address: userIp,
                        user_agent: navigator.userAgent
                    });
                
                showMessage('сообщение отправлено', 'success');
                adminModal.style.display = 'none';
                document.getElementById('adminName').value = '';
                document.getElementById('adminMessage').value = '';
                
            } catch (error) {
                showMessage('ошибка: ' + error.message, 'error');
            }
        });

        // Create thread modal
        const createThreadBtn = document.getElementById('createThreadBtn');
        const createThreadModal = document.getElementById('createThreadModal');
        const cancelThread = document.getElementById('cancelThread');
        const submitThread = document.getElementById('submitThread');

        createThreadBtn?.addEventListener('click', () => {
            createThreadModal.style.display = 'block';
        });

        cancelThread?.addEventListener('click', () => {
            createThreadModal.style.display = 'none';
            document.getElementById('threadTitle').value = '';
            document.getElementById('threadContent').value = '';
        });

        createThreadModal?.addEventListener('click', (e) => {
            if (e.target === createThreadModal) {
                createThreadModal.style.display = 'none';
                document.getElementById('threadTitle').value = '';
                document.getElementById('threadContent').value = '';
            }
        });

        submitThread?.addEventListener('click', createThread);

        document.addEventListener('DOMContentLoaded', async () => {
            await getUserIp();
            await loadThreads();
        });
    </script>
</body>
</html>
