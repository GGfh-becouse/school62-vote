<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>krg62 | дуэль голосований</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
}

body {
    background: #f8f9fc;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 32px 0;
}

.container {
    max-width: 1200px;
    width: 100%;
    position: relative;
    padding: 0 16px;
}

.main-content {
    display: block;
    padding-bottom: 90px;
}

/* Анимации */
@keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeDown {
    from { opacity: 0; transform: translateY(-12px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes cardGlow {
    0% { box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
    50% { box-shadow: 0 20px 40px rgba(46,52,64,0.2); }
    100% { box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
}

@keyframes votePulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); background: #27ae60; color: white; }
    100% { transform: scale(1); }
}

@keyframes slideInRight {
    from { opacity: 0; transform: translateX(30px); }
    to { opacity: 1; transform: translateX(0); }
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

/* Хедер */
.header {
    background: #ffffff;
    border-radius: 24px;
    padding: 16px 24px;
    margin: 8px 0 20px 0;
    box-shadow: 0 10px 20px -8px rgba(0,0,0,0.1);
    border: 1px solid rgba(0,0,0,0.02);
    animation: fadeDown 0.4s cubic-bezier(0.22,1,0.36,1) both;
}

.header-content {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo {
    display: flex;
    align-items: center;
    gap: 12px;
}

.logo-img {
    height: 40px;
    width: auto;
    object-fit: contain;
}

.logo h1 {
    font-size: 1.5rem;
    font-weight: 700;
    color: #1a1e2b;
    letter-spacing: -0.5px;
}

.header-icons {
    display: flex;
    gap: 20px;
    align-items: center;
}

.header-icon {
    font-size: 1.3rem;
    color: #8b93a6;
    transition: all 0.2s;
    cursor: pointer;
    text-decoration: none;
}

.header-icon:hover {
    color: #2e3440;
    transform: scale(1.1);
}

/* Блок авторизации */
.auth-status-bar {
    background: #ffffff;
    border-radius: 40px;
    padding: 12px 24px;
    margin-bottom: 24px;
    box-shadow: 0 4px 12px -4px rgba(0,0,0,0.05);
    display: flex;
    align-items: center;
    justify-content: space-between;
    animation: fadeUp 0.45s cubic-bezier(0.22,1,0.36,1) 0.05s both;
    flex-wrap: wrap;
    gap: 12px;
}

.auth-info {
    display: flex;
    align-items: center;
    gap: 12px;
}

.auth-avatar {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    overflow: hidden;
    background: #f0f2f5;
    display: flex;
    align-items: center;
    justify-content: center;
}

.auth-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.auth-welcome {
    font-size: 0.95rem;
    color: #1a1e2b;
    font-weight: 500;
}

.auth-badge {
    background: linear-gradient(135deg, #f1c40f, #e67e22);
    color: #1a1e2b;
    padding: 4px 12px;
    border-radius: 30px;
    font-size: 0.7rem;
    font-weight: 700;
    margin-left: 8px;
}

.auth-buttons {
    display: flex;
    gap: 10px;
}

.auth-btn {
    background: #f0f2f5;
    border: none;
    padding: 8px 20px;
    border-radius: 30px;
    font-weight: 500;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
    color: #1a1e2b;
}

.auth-btn:hover {
    background: #e4e6e9;
    transform: translateY(-2px);
}

.auth-btn.primary {
    background: #2e3440;
    color: white;
}

.auth-btn.primary:hover {
    background: #1a1e2b;
}

/* Статистика */
.stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
    animation: fadeUp 0.5s cubic-bezier(0.22,1,0.36,1) 0.1s both;
}

.stat-card {
    background: #ffffff;
    border-radius: 20px;
    padding: 20px;
    text-align: center;
    box-shadow: 0 8px 16px -8px rgba(0,0,0,0.06);
    transition: transform 0.2s;
}

.stat-card:hover {
    transform: translateY(-2px);
}

.stat-icon {
    font-size: 2rem;
    margin-bottom: 8px;
}

.stat-value {
    font-size: 1.8rem;
    font-weight: 800;
    color: #2e3440;
}

.stat-label {
    font-size: 0.8rem;
    color: #8b93a6;
    margin-top: 4px;
}

/* Заголовок дуэли */
.duel-header {
    text-align: center;
    margin-bottom: 32px;
    animation: fadeUp 0.5s cubic-bezier(0.22,1,0.36,1) 0.15s both;
}

.duel-header h2 {
    font-size: 1.8rem;
    font-weight: 700;
    color: #1a1e2b;
    display: inline-flex;
    align-items: center;
    gap: 12px;
    background: linear-gradient(135deg, #2e3440, #4a5568);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.duel-subtitle {
    color: #8b93a6;
    margin-top: 8px;
    font-size: 0.9rem;
}

/* Карточки дуэли */
.duel-container {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 24px;
    margin-bottom: 32px;
    align-items: stretch;
}

.duel-card {
    background: #ffffff;
    border-radius: 28px;
    padding: 28px 24px;
    box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1);
    transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
    cursor: pointer;
    position: relative;
    overflow: hidden;
    border: 2px solid transparent;
    animation: fadeUp 0.5s cubic-bezier(0.22,1,0.36,1) both;
}

.duel-card:hover {
    transform: translateY(-6px) scale(1.02);
    box-shadow: 0 25px 45px -12px rgba(0,0,0,0.2);
}

.duel-card.selected-left {
    border-color: #27ae60;
    background: linear-gradient(135deg, #ffffff, #f0fff4);
}

.duel-card.selected-right {
    border-color: #e74c3c;
    background: linear-gradient(135deg, #ffffff, #fff5f5);
}

.duel-card.voting {
    animation: cardGlow 0.3s ease;
}

.card-badge {
    position: absolute;
    top: 16px;
    right: 16px;
    padding: 6px 14px;
    border-radius: 30px;
    font-size: 0.7rem;
    font-weight: 700;
    color: white;
}

.rank-s {
    background: linear-gradient(135deg, #ffd700, #ff8c00);
}

.rank-a {
    background: linear-gradient(135deg, #a0a0a0, #696969);
}

.rank-b {
    background: linear-gradient(135deg, #cd7f32, #8b4513);
}

.rank-c {
    background: linear-gradient(135deg, #4a90e2, #357abd);
}

.rank-d {
    background: linear-gradient(135deg, #95a5a6, #7f8c8d);
}

.duel-card-name {
    font-size: 1.4rem;
    font-weight: 700;
    color: #1a1e2b;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
}

.duel-card-class {
    font-size: 0.85rem;
    color: #8b93a6;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
}

.class-icon {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    display: inline-block;
}

.duel-card-points {
    font-size: 2rem;
    font-weight: 800;
    color: #2e3440;
    margin: 16px 0;
}

.duel-card-rank {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.7rem;
    font-weight: 600;
    margin-top: 8px;
}

.duel-vs {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.8rem;
    font-weight: 800;
    color: #8b93a6;
    animation: fadeUp 0.5s cubic-bezier(0.22,1,0.36,1) 0.2s both;
}

.vs-circle {
    width: 70px;
    height: 70px;
    background: #f0f2f5;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.3rem;
    font-weight: 800;
    color: #2e3440;
}

/* Кнопка битвы */
.battle-btn-container {
    text-align: center;
    margin-bottom: 32px;
    animation: fadeUp 0.5s cubic-bezier(0.22,1,0.36,1) 0.25s both;
}

.battle-btn {
    background: linear-gradient(135deg, #2e3440, #4a5568);
    color: white;
    border: none;
    padding: 16px 48px;
    border-radius: 50px;
    font-size: 1.1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow: 0 8px 20px rgba(46,52,64,0.3);
}

.battle-btn:hover {
    transform: translateY(-3px) scale(1.02);
    box-shadow: 0 12px 28px rgba(46,52,64,0.4);
}

.battle-btn:active {
    transform: translateY(0) scale(0.98);
}

.battle-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
}

/* Таблица лидеров */
.leaderboard-section {
    background: #ffffff;
    border-radius: 28px;
    padding: 24px;
    margin-top: 32px;
    box-shadow: 0 10px 25px -10px rgba(0,0,0,0.08);
    animation: fadeUp 0.5s cubic-bezier(0.22,1,0.36,1) 0.3s both;
}

.leaderboard-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 12px;
}

.leaderboard-header h3 {
    font-size: 1.3rem;
    font-weight: 600;
    color: #1a1e2b;
}

.rank-filter {
    display: flex;
    gap: 8px;
}

.filter-btn {
    background: #f0f2f5;
    border: none;
    padding: 6px 16px;
    border-radius: 30px;
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
}

.filter-btn.active {
    background: #2e3440;
    color: white;
}

.filter-btn:hover:not(.active) {
    background: #e4e6e9;
}

.leaderboard-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.leaderboard-item {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 12px 16px;
    background: #f8f9fc;
    border-radius: 16px;
    transition: all 0.2s;
}

.leaderboard-item:hover {
    background: #f0f2f5;
    transform: translateX(4px);
}

.rank-number {
    width: 40px;
    font-size: 1.2rem;
    font-weight: 700;
    color: #8b93a6;
}

.rank-number.top-1 {
    color: #ffd700;
}

.rank-number.top-2 {
    color: #c0c0c0;
}

.rank-number.top-3 {
    color: #cd7f32;
}

.leaderboard-info {
    flex: 1;
}

.leaderboard-name {
    font-weight: 600;
    color: #1a1e2b;
}

.leaderboard-class {
    font-size: 0.7rem;
    color: #8b93a6;
}

.leaderboard-points {
    font-weight: 700;
    color: #2e3440;
    font-size: 1.1rem;
}

.leaderboard-rank {
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 0.7rem;
    font-weight: 600;
}

/* Админ панель */
.admin-section {
    background: #ffffff;
    border-radius: 28px;
    padding: 24px;
    margin-top: 24px;
    animation: fadeUp 0.5s cubic-bezier(0.22,1,0.36,1) 0.35s both;
}

.admin-section h3 {
    font-size: 1rem;
    color: #8b93a6;
    margin-bottom: 16px;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.admin-form {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
}

.admin-input {
    flex: 1;
    padding: 12px 16px;
    border: 1px solid #e0e4e8;
    border-radius: 16px;
    font-size: 0.9rem;
    background: #f8f9fc;
}

.admin-input:focus {
    outline: none;
    border-color: #2e3440;
}

.admin-btn {
    background: #2e3440;
    color: white;
    border: none;
    padding: 12px 24px;
    border-radius: 16px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
}

.admin-btn:hover {
    background: #1a1e2b;
}

/* Боттом нав */
.bottom-nav {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    max-width: 560px;
    width: calc(100% - 32px);
    border-radius: 40px;
    padding: 8px;
    display: flex;
    justify-content: space-around;
    box-shadow: 0 10px 30px -8px rgba(0,0,0,0.15);
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(12px);
    z-index: 1000;
}

.nav-item-bottom {
    display: flex;
    flex-direction: column;
    align-items: center;
    color: #8b93a6;
    text-decoration: none;
    font-size: 0.6rem;
    font-weight: 500;
    flex: 1;
    padding: 8px 0;
    border-radius: 30px;
    transition: all 0.2s;
}

.nav-item-bottom.active {
    background: #f0f2f5;
    color: #2e3440;
}

.nav-icon-bottom {
    font-size: 1.2rem;
    margin-bottom: 4px;
}

/* Сообщения */
.message {
    position: fixed;
    top: 20px;
    right: 20px;
    padding: 12px 24px;
    border-radius: 30px;
    color: white;
    font-weight: 500;
    z-index: 10002;
    animation: slideInRight 0.3s cubic-bezier(0.22,1,0.36,1);
    box-shadow: 0 10px 20px -8px rgba(0,0,0,0.2);
}

.message.success { background: #27ae60; }
.message.error { background: #e74c3c; }
.message.info { background: #3498db; }

@media (max-width: 768px) {
    .duel-container {
        grid-template-columns: 1fr;
        gap: 16px;
    }
    
    .duel-vs {
        order: -1;
    }
    
    .duel-card {
        padding: 20px;
    }
    
    .stats-grid {
        grid-template-columns: repeat(2, 1fr);
    }
}
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
<div class="container">
    <div class="main-content">

        <div class="header">
            <div class="header-content">
                <div class="logo">
                    <img src="top_logotype.png" alt="krg62" class="logo-img" onerror="this.style.display='none'">
                    <h1>дуэль голосований</h1>
                </div>
                <div class="header-icons">
                    <a href="#" class="header-icon" id="refreshBtn">
                        <i class="fas fa-sync-alt"></i>
                    </a>
                </div>
            </div>
        </div>

        <div class="auth-status-bar">
            <div class="auth-info">
                <div class="auth-avatar">
                    <img src="https://i.pravatar.cc/300" alt="" id="avatarImg">
                </div>
                <span class="auth-welcome">
                    <span id="authDisplayName">Гость</span>
                    <span class="auth-badge" id="primeBadge" style="display:none;"><i class="fas fa-crown"></i> prime</span>
                </span>
            </div>
            <div class="auth-buttons" id="authButtons">
                <a href="#" class="auth-btn" id="loginBtn">войти</a>
                <a href="#" class="auth-btn primary" id="registerBtn">регистрация</a>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">👥</div>
                <div class="stat-value" id="totalPlayers">0</div>
                <div class="stat-label">участников</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⚔️</div>
                <div class="stat-value" id="totalBattles">0</div>
                <div class="stat-label">всего битв</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🏆</div>
                <div class="stat-value" id="topPlayerName">-</div>
                <div class="stat-label">лидер</div>
            </div>
        </div>

        <div class="duel-header">
            <h2><i class="fas fa-fist-raised"></i> выбери сильнейшего <i class="fas fa-fist-raised"></i></h2>
            <div class="duel-subtitle">кликни на карточку, которая достойна победы!</div>
        </div>

        <div class="duel-container" id="duelContainer">
            <div class="duel-card" id="cardLeft" onclick="selectCard('left')">
                <div class="card-badge rank-s" id="leftBadge">S ранг</div>
                <div class="duel-card-name" id="leftName">Загрузка...</div>
                <div class="duel-card-class" id="leftClass"></div>
                <div class="duel-card-points" id="leftPoints">0</div>
                <div class="duel-card-rank" id="leftRankLabel"></div>
            </div>
            <div class="duel-vs">
                <div class="vs-circle">VS</div>
            </div>
            <div class="duel-card" id="cardRight" onclick="selectCard('right')">
                <div class="card-badge rank-s" id="rightBadge">S ранг</div>
                <div class="duel-card-name" id="rightName">Загрузка...</div>
                <div class="duel-card-class" id="rightClass"></div>
                <div class="duel-card-points" id="rightPoints">0</div>
                <div class="duel-card-rank" id="rightRankLabel"></div>
            </div>
        </div>

        <div class="battle-btn-container">
            <button class="battle-btn" id="battleBtn" onclick="castVote()">
                <i class="fas fa-gavel"></i> отдать голос
            </button>
        </div>

        <div class="leaderboard-section">
            <div class="leaderboard-header">
                <h3><i class="fas fa-trophy"></i> таблица лидеров</h3>
                <div class="rank-filter">
                    <button class="filter-btn active" data-rank="all">все</button>
                    <button class="filter-btn" data-rank="S">S ранг</button>
                    <button class="filter-btn" data-rank="A">A ранг</button>
                    <button class="filter-btn" data-rank="B">B ранг</button>
                    <button class="filter-btn" data-rank="C">C ранг</button>
                    <button class="filter-btn" data-rank="D">D ранг</button>
                </div>
            </div>
            <div class="leaderboard-list" id="leaderboardList">
                <div style="text-align:center;padding:40px;">загрузка...</div>
            </div>
        </div>

        <div class="admin-section" id="adminSection" style="display:none;">
            <h3><i class="fas fa-user-shield"></i> админ панель</h3>
            <div class="admin-form">
                <input type="text" id="newPlayerName" class="admin-input" placeholder="имя игрока">
                <input type="text" id="newPlayerClass" class="admin-input" placeholder="класс (например: Воин)">
                <select id="newPlayerRank" class="admin-input">
                    <option value="S">S ранг</option>
                    <option value="A">A ранг</option>
                    <option value="B">B ранг</option>
                    <option value="C">C ранг</option>
                    <option value="D">D ранг</option>
                </select>
                <button class="admin-btn" id="addPlayerBtn"><i class="fas fa-plus"></i> добавить</button>
            </div>
        </div>

    </div>
</div>

<nav class="bottom-nav">
    <a href="#" class="nav-item-bottom" onclick="return false;">
        <i class="fas fa-home nav-icon-bottom"></i><span>главная</span>
    </a>
    <a href="#" class="nav-item-bottom active" onclick="return false;">
        <i class="fas fa-fist-raised nav-icon-bottom"></i><span>дуэль</span>
    </a>
    <a href="#" class="nav-item-bottom" onclick="return false;">
        <i class="fas fa-comment nav-icon-bottom"></i><span>темки</span>
    </a>
    <a href="#" class="nav-item-bottom" onclick="return false;">
        <i class="fas fa-image nav-icon-bottom"></i><span>сливы</span>
    </a>
    <a href="#" class="nav-item-bottom" onclick="return false;">
        <i class="fas fa-user nav-icon-bottom"></i><span>аккаунт</span>
    </a>
</nav>

<div id="messageContainer"></div>

<script>
    // ============================================
    // ДАННЫЕ ИГРОКОВ (локальное хранилище)
    // ============================================
    let players = [];
    let selectedSide = null; // 'left' or 'right'
    let battleHistory = [];
    let currentUserId = null;
    let currentUserName = null;
    
    // Ранги и множители голосов
    const rankMultipliers = {
        'S': 10,
        'A': 9,
        'B': 8,
        'C': 7,
        'D': 6
    };
    
    const rankNames = {
        'S': 'S',
        'A': 'A',
        'B': 'B',
        'C': 'C',
        'D': 'D'
    };
    
    const rankColors = {
        'S': '#ffd700',
        'A': '#a0a0a0',
        'B': '#cd7f32',
        'C': '#4a90e2',
        'D': '#95a5a6'
    };
    
    // Загрузка данных из localStorage
    function loadData() {
        const saved = localStorage.getItem('duel_players');
        if (saved) {
            players = JSON.parse(saved);
        } else {
            // Стартовые игроки
            players = [
                { id: 1, name: 'Александр', class: 'Воин', rank: 'S', points: 1250, wins: 45, battles: 50 },
                { id: 2, name: 'Екатерина', class: 'Маг', rank: 'A', points: 980, wins: 38, battles: 42 },
                { id: 3, name: 'Дмитрий', class: 'Лучник', rank: 'S', points: 1100, wins: 42, battles: 48 },
                { id: 4, name: 'Анна', class: 'Жрица', rank: 'B', points: 720, wins: 28, battles: 35 },
                { id: 5, name: 'Максим', class: 'Танк', rank: 'C', points: 540, wins: 20, battles: 30 },
                { id: 6, name: 'Ольга', class: 'Разбойник', rank: 'A', points: 890, wins: 35, battles: 40 }
            ];
            saveData();
        }
        
        const history = localStorage.getItem('duel_history');
        if (history) {
            battleHistory = JSON.parse(history);
        }
    }
    
    function saveData() {
        localStorage.setItem('duel_players', JSON.stringify(players));
        localStorage.setItem('duel_history', JSON.stringify(battleHistory));
    }
    
    // Получение ранга по очкам
    function getRankByPoints(points) {
        if (points >= 1000) return 'S';
        if (points >= 800) return 'A';
        if (points >= 600) return 'B';
        if (points >= 400) return 'C';
        return 'D';
    }
    
    // Обновление ранга игрока
    function updatePlayerRank(player) {
        const newRank = getRankByPoints(player.points);
        if (newRank !== player.rank) {
            player.rank = newRank;
            return true;
        }
        return false;
    }
    
    // Голосование
    function castVote() {
        if (!selectedSide) {
            showMessage('выбери карточку, за которую хочешь проголосовать!', 'error');
            return;
        }
        
        if (!currentUserId) {
            showMessage('войдите, чтобы голосовать', 'error');
            return;
        }
        
        const leftCard = document.getElementById('cardLeft');
        const rightCard = document.getElementById('cardRight');
        
        const leftPlayerId = parseInt(leftCard.getAttribute('data-id'));
        const rightPlayerId = parseInt(rightCard.getAttribute('data-id'));
        
        let winnerId, loserId;
        let winnerMultiplier, loserMultiplier;
        
        if (selectedSide === 'left') {
            winnerId = leftPlayerId;
            loserId = rightPlayerId;
        } else {
            winnerId = rightPlayerId;
            loserId = leftPlayerId;
        }
        
        const winner = players.find(p => p.id === winnerId);
        const loser = players.find(p => p.id === loserId);
        
        if (!winner || !loser) {
            showMessage('ошибка: игрок не найден', 'error');
            return;
        }
        
        winnerMultiplier = rankMultipliers[winner.rank];
        loserMultiplier = rankMultipliers[loser.rank];
        
        // Начисление баллов победителю
        const pointsGained = winnerMultiplier;
        winner.points += pointsGained;
        winner.wins = (winner.wins || 0) + 1;
        winner.battles = (winner.battles || 0) + 1;
        
        // Проигравший теряет баллы (но не меньше 0)
        loser.points = Math.max(0, loser.points - loserMultiplier);
        loser.battles = (loser.battles || 0) + 1;
        
        // Обновление рангов
        updatePlayerRank(winner);
        updatePlayerRank(loser);
        
        // Сохраняем историю
        battleHistory.unshift({
            id: Date.now(),
            winner: winner.name,
            loser: loser.name,
            points: pointsGained,
            date: new Date().toLocaleString('ru'),
            voter: currentUserName
        });
        
        // Ограничиваем историю последними 50 записями
        if (battleHistory.length > 50) battleHistory.pop();
        
        saveData();
        
        // Анимация
        const winnerCard = selectedSide === 'left' ? leftCard : rightCard;
        winnerCard.style.animation = 'votePulse 0.5s ease';
        setTimeout(() => {
            winnerCard.style.animation = '';
        }, 500);
        
        showMessage(`🏆 ${winner.name} +${pointsGained} баллов!`, 'success');
        
        // Сброс выбора и обновление UI
        selectedSide = null;
        document.getElementById('cardLeft').classList.remove('selected-left');
        document.getElementById('cardRight').classList.remove('selected-right');
        
        // Обновляем дуэль новыми соперниками
        generateRandomDuel();
        updateLeaderboard();
        updateStats();
    }
    
    // Генерация случайной дуэли
    function generateRandomDuel() {
        if (players.length < 2) return;
        
        let player1, player2;
        do {
            const randomIndex1 = Math.floor(Math.random() * players.length);
            const randomIndex2 = Math.floor(Math.random() * players.length);
            player1 = players[randomIndex1];
            player2 = players[randomIndex2];
        } while (player1.id === player2.id && players.length > 1);
        
        updateDuelCards(player1, player2);
    }
    
    // Обновление карточек дуэли
    function updateDuelCards(player1, player2) {
        const leftCard = document.getElementById('cardLeft');
        const rightCard = document.getElementById('cardRight');
        
        leftCard.setAttribute('data-id', player1.id);
        rightCard.setAttribute('data-id', player2.id);
        
        // Левая карточка
        document.getElementById('leftName').innerHTML = `<i class="fas fa-user"></i> ${player1.name}`;
        document.getElementById('leftClass').innerHTML = `<span class="class-icon" style="background:${rankColors[player1.rank]}"></span> ${player1.class}`;
        document.getElementById('leftPoints').innerHTML = `${player1.points} <span style="font-size:0.9rem;">баллов</span>`;
        
        const leftBadge = document.getElementById('leftBadge');
        leftBadge.textContent = `${player1.rank} ранг`;
        leftBadge.className = `card-badge rank-${player1.rank.toLowerCase()}`;
        
        const leftRankLabel = document.getElementById('leftRankLabel');
        leftRankLabel.textContent = `★ множитель: ${rankMultipliers[player1.rank]}`;
        leftRankLabel.style.background = rankColors[player1.rank] + '20';
        leftRankLabel.style.color = rankColors[player1.rank];
        
        // Правая карточка
        document.getElementById('rightName').innerHTML = `<i class="fas fa-user"></i> ${player2.name}`;
        document.getElementById('rightClass').innerHTML = `<span class="class-icon" style="background:${rankColors[player2.rank]}"></span> ${player2.class}`;
        document.getElementById('rightPoints').innerHTML = `${player2.points} <span style="font-size:0.9rem;">баллов</span>`;
        
        const rightBadge = document.getElementById('rightBadge');
        rightBadge.textContent = `${player2.rank} ранг`;
        rightBadge.className = `card-badge rank-${player2.rank.toLowerCase()}`;
        
        const rightRankLabel = document.getElementById('rightRankLabel');
        rightRankLabel.textContent = `★ множитель: ${rankMultipliers[player2.rank]}`;
        rightRankLabel.style.background = rankColors[player2.rank] + '20';
        rightRankLabel.style.color = rankColors[player2.rank];
    }
    
    // Выбор карточки
    function selectCard(side) {
        if (!currentUserId) {
            showMessage('войдите, чтобы голосовать', 'error');
            return;
        }
        
        selectedSide = side;
        
        const leftCard = document.getElementById('cardLeft');
        const rightCard = document.getElementById('cardRight');
        
        if (side === 'left') {
            leftCard.classList.add('selected-left');
            rightCard.classList.remove('selected-right');
        } else {
            rightCard.classList.add('selected-right');
            leftCard.classList.remove('selected-left');
        }
        
        showMessage(`выбрано: ${side === 'left' ? 'левый' : 'правый'} боец`, 'info');
    }
    
    // Обновление таблицы лидеров
    function updateLeaderboard(filterRank = 'all') {
        const list = document.getElementById('leaderboardList');
        let filtered = [...players];
        
        if (filterRank !== 'all') {
            filtered = filtered.filter(p => p.rank === filterRank);
        }
        
        filtered.sort((a, b) => b.points - a.points);
        
        if (filtered.length === 0) {
            list.innerHTML = '<div style="text-align:center;padding:40px;color:#8b93a6;">нет игроков</div>';
            return;
        }
        
        list.innerHTML = filtered.map((player, idx) => {
            let rankClass = '';
            if (idx === 0) rankClass = 'top-1';
            else if (idx === 1) rankClass = 'top-2';
            else if (idx === 2) rankClass = 'top-3';
            
            return `
                <div class="leaderboard-item">
                    <div class="rank-number ${rankClass}">${idx + 1}</div>
                    <div class="leaderboard-info">
                        <div class="leaderboard-name">${escapeHtml(player.name)}</div>
                        <div class="leaderboard-class">${escapeHtml(player.class)}</div>
                    </div>
                    <div class="leaderboard-points">${player.points}</div>
                    <div class="leaderboard-rank" style="background:${rankColors[player.rank]}20;color:${rankColors[player.rank]}">
                        ${player.rank} ранг
                    </div>
                </div>
            `;
        }).join('');
    }
    
    // Обновление статистики
    function updateStats() {
        document.getElementById('totalPlayers').textContent = players.length;
        document.getElementById('totalBattles').textContent = battleHistory.length;
        
        const topPlayer = [...players].sort((a, b) => b.points - a.points)[0];
        if (topPlayer) {
            document.getElementById('topPlayerName').textContent = topPlayer.name;
        } else {
            document.getElementById('topPlayerName').textContent = '-';
        }
    }
    
    // Добавление игрока (админ)
    function addPlayer(name, playerClass, rank) {
        if (!name || !playerClass) {
            showMessage('заполните все поля', 'error');
            return false;
        }
        
        const newId = Math.max(...players.map(p => p.id), 0) + 1;
        const basePoints = rank === 'S' ? 1000 : rank === 'A' ? 800 : rank === 'B' ? 600 : rank === 'C' ? 400 : 300;
        
        players.push({
            id: newId,
            name: name.trim(),
            class: playerClass.trim(),
            rank: rank,
            points: basePoints,
            wins: 0,
            battles: 0
        });
        
        saveData();
        updateLeaderboard();
        updateStats();
        generateRandomDuel();
        showMessage(`✅ игрок ${name} добавлен!`, 'success');
        return true;
    }
    
    // Авторизация (простая для демо)
    function loginAsGuest() {
        currentUserId = Date.now();
        currentUserName = 'Гость_' + Math.floor(Math.random() * 1000);
        updateAuthDisplay();
        showMessage(`добро пожаловать, ${currentUserName}!`, 'success');
    }
    
    function updateAuthDisplay() {
        const nameSpan = document.getElementById('authDisplayName');
        const avatarImg = document.getElementById('avatarImg');
        const primeBadge = document.getElementById('primeBadge');
        const authBtns = document.getElementById('authButtons');
        
        if (currentUserId) {
            nameSpan.textContent = currentUserName;
            avatarImg.src = `https://i.pravatar.cc/300?img=${currentUserId % 70}`;
            primeBadge.style.display = 'none';
            authBtns.innerHTML = `<button class="auth-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> выйти</button>`;
        } else {
            nameSpan.textContent = 'Гость';
            avatarImg.src = 'https://i.pravatar.cc/300';
            primeBadge.style.display = 'none';
            authBtns.innerHTML = `
                <button class="auth-btn" onclick="loginAsGuest()">гость</button>
                <button class="auth-btn primary" onclick="loginAsGuest()">войти</button>
            `;
        }
    }
    
    function logout() {
        currentUserId = null;
        currentUserName = null;
        selectedSide = null;
        document.getElementById('cardLeft').classList.remove('selected-left');
        document.getElementById('cardRight').classList.remove('selected-right');
        updateAuthDisplay();
        showMessage('вы вышли из системы', 'info');
    }
    
    function showMessage(text, type) {
        const container = document.getElementById('messageContainer');
        const msg = document.createElement('div');
        msg.className = `message ${type}`;
        msg.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check' : type === 'error' ? 'fa-exclamation' : 'fa-info'}"></i> ${text}`;
        container.appendChild(msg);
        setTimeout(() => {
            msg.style.animation = 'slideInRight 0.3s cubic-bezier(0.22,1,0.36,1) reverse';
            setTimeout(() => msg.remove(), 280);
        }, 2500);
    }
    
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    // Инициализация
    function init() {
        loadData();
        
        // Проверка на админа (можно сделать по паролю, но для демо показываем всегда)
        document.getElementById('adminSection').style.display = 'block';
        
        generateRandomDuel();
        updateLeaderboard();
        updateStats();
        updateAuthDisplay();
        
        // Фильтры таблицы
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                updateLeaderboard(this.getAttribute('data-rank'));
            });
        });
        
        // Добавление игрока
        document.getElementById('addPlayerBtn').addEventListener('click', () => {
            const name = document.getElementById('newPlayerName').value;
            const playerClass = document.getElementById('newPlayerClass').value;
            const rank = document.getElementById('newPlayerRank').value;
            addPlayer(name, playerClass, rank);
            document.getElementById('newPlayerName').value = '';
            document.getElementById('newPlayerClass').value = '';
        });
        
        // Обновление дуэли
        document.getElementById('refreshBtn').addEventListener('click', () => {
            generateRandomDuel();
            selectedSide = null;
            document.getElementById('cardLeft').classList.remove('selected-left');
            document.getElementById('cardRight').classList.remove('selected-right');
            showMessage('новая дуэль готова!', 'info');
        });
    }
    
    // Запуск
    init();
</script>
</body>
</html>
